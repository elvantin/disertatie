# ============================================================
# Ansible Configuration - SC MEDIA SRL
# Infrastructure: Azure Cloud (swedencentral)
# ============================================================

[defaults]

# Inventory Configuration
# Dynamic: discovers VMs automatically from Azure (requires az login + azure.azcollection)
inventory = ./inventory/azure_rm.yml
# Static fallback: inventory = ./inventory/hosts.ini

# SSH Configuration
host_key_checking = False
remote_user = azureadmin
# private_key_file = ~/.ssh/id_rsa  # Enable after SSH keys are deployed

# Python Interpreter
interpreter_python = auto_silent

# Connection Settings
timeout = 30
forks = 10
gathering = smart
fact_caching = jsonfile
fact_caching_connection = /tmp/ansible_fact_cache
fact_caching_timeout = 86400

# Output Configuration
stdout_callback = yaml
bin_ansible_callbacks = True
nocows = 1
display_skipped_hosts = False
display_ok_hosts = True
any_errors_fatal = False

# Roles and Collections
roles_path = ./roles:~/.ansible/roles:/usr/share/ansible/roles
collections_path = ./collections:~/.ansible/collections:/usr/share/ansible/collections

# Logging
log_path = ./ansible.log
deprecation_warnings = True

# Retry Configuration
retry_files_enabled = False

# Privilege Escalation
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# Performance Tuning
pipelining = True
control_path_dir = /tmp/ansible-ssh-%%h-%%p-%%r
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o PreferredAuthentications=publickey,password

# ============================================================
# Inventory Configuration
# ============================================================

[inventory]
# Enable inventory plugins
enable_plugins = host_list, script, auto, yaml, ini, toml, azure_rm

# Ignore warnings
unparsed_is_failed = False

# ============================================================
# SSH Configuration for Linux VMs
# ============================================================

[ssh_connection]
# Connection pooling
ssh_args = -o ControlMaster=auto -o ControlPersist=60s -o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null
pipelining = True

# Transfer method (smart, sftp, scp, piped)
transfer_method = smart

# Retries
retries = 3

# ============================================================
# Privilege Escalation
# ============================================================

[privilege_escalation]
become = True
become_method = sudo
become_user = root
become_ask_pass = False

# ============================================================
# Colors Configuration
# ============================================================

[colors]
highlight = white
verbose = blue
warn = bright purple
error = red
debug = dark gray
deprecate = purple
skip = cyan
unreachable = red
ok = green
changed = yellow
diff_add = green
diff_remove = red
diff_lines = cyan

# ============================================================
# Plugin Configuration
# ============================================================

[callback_plugins]
callback_whitelist = profile_tasks, timer

# ============================================================
# Notes:
# ============================================================
# - host_key_checking = False: Skip SSH host key verification (dev only)
# - pipelining = True: Improves performance by reducing SSH connections
# - become = True: Enable privilege escalation by default (sudo)
# - log_path: All playbook runs are logged to ansible.log
# - Windows VMs require python3-winrm installed on control node (jumphost)
# - SSH keys: ansible-playbook playbooks/setup-ssh-keys.yml --ask-pass
# ============================================================

# ============================================================
# Security Recommendations:
# ============================================================
# - Store passwords in Ansible Vault: ansible-vault create group_vars/all/vault.yml
# - Use SSH keys instead of passwords for Linux VMs
# - Enable host_key_checking = True after initial setup
# - Use HTTPS (port 5986) for WinRM in production environments
# - Rotate credentials regularly
# ============================================================
