---
# ============================================================
# Group Variables for Windows VMs
# Applied to all hosts in the 'windows' group
# ============================================================

# WinRM Connection Settings
ansible_connection: winrm
ansible_winrm_transport: ntlm
ansible_winrm_server_cert_validation: ignore
ansible_port: 5985

# Disable sudo become for Windows (incompatible with PowerShell)
ansible_become: no

# WinRM Authentication — password from Ansible Vault (group_vars/all/vault.yml).
# Vault is created on the jumphost by: bash scripts/create-ansible-vault.sh
ansible_password: "{{ vault_admin_password }}"
