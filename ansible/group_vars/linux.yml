---
# ============================================================
# Group Variables for Linux VMs
# Applied to all hosts in the 'linux' group
# ============================================================

# Public website domain — used by nginx (vm-web-01) and wordpress (vm-cms-01)
# Override per-environment in group_vars/dev.yml or group_vars/prod.yml
website_domain: "mediasrl.swedencentral.cloudapp.azure.com"

# SSH Connection Settings
ansible_connection: ssh
ansible_port: 22
ansible_python_interpreter: /usr/bin/python3
ansible_ssh_common_args: >-
  -o StrictHostKeyChecking=no
  -o UserKnownHostsFile=/dev/null
  -o PreferredAuthentications=keyboard-interactive,password
  -o PasswordAuthentication=yes

# SSH Authentication — password from Ansible Vault (group_vars/all/vault.yml).
# Vault is created on the jumphost by: bash scripts/create-ansible-vault.sh
ansible_password: "{{ vault_admin_password }}"

# Privilege escalation
ansible_become: yes
ansible_become_method: sudo
