# ============================================================
# Service Deployment Playbook
# Deploys only application services (skip baseline config)
# ============================================================

---
- name: Deploy Web Server
  hosts: webserver
  become: yes
  roles:
    - nginx
  tags: [webserver]

- name: Deploy Database Server
  hosts: database
  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
  roles:
    - mysql
  tags: [database]

- name: Deploy CMS and Mail Server
  hosts: cmsserver
  become: yes
  roles:
    - wordpress
    - postfix
  tags: [cms, mail]
