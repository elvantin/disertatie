---
# ============================================================
# Site Playbook - SC MEDIA SRL Infrastructure
# Complete orchestration for 6 VMs: 1 Jumphost + 2 Windows + 3 Ubuntu
# ============================================================
#
# Purpose:
#   Main orchestration playbook that configures all infrastructure VMs
#   in the correct order to avoid dependency failures
#
# Prerequisites:
#   - Infrastructure deployed via Bicep
#   - Jumphost bootstrapped with Ansible + xRDP
#   - WinRM configured on Windows VMs (scripts/bootstrap-windows-winrm.ps1)
#   - SSH keys distributed to Linux VMs (playbooks/setup-ssh-keys.yml)
#
# Usage:
#   # Complete deployment
#   ansible-playbook playbooks/site.yml
#
#   # Deploy specific roles
#   ansible-playbook playbooks/site.yml --tags common
#   ansible-playbook playbooks/site.yml --tags sqlserver
#   ansible-playbook playbooks/site.yml --tags nginx,wordpress
#
#   # Deploy to specific hosts
#   ansible-playbook playbooks/site.yml --limit webserver
#   ansible-playbook playbooks/site.yml --limit linux
#   ansible-playbook playbooks/site.yml --limit windows
#
#   # Dry run (check mode)
#   ansible-playbook playbooks/site.yml --check
#
# ============================================================

# =============================================================================
# Phase 1: Baseline Configuration (Common)
# =============================================================================

- name: Configure Linux VMs - Common Baseline (Ubuntu 22.04)
  hosts: linux:!jumphost
  become: yes
  gather_facts: yes

  roles:
    - role: common
      tags: [common, baseline, linux]

  tasks:
    - name: Display Linux baseline configuration status
      debug:
        msg: "Baseline configuration completed for {{ inventory_hostname }}"
      tags: [common]

- name: Configure Windows VMs - Common Baseline (Windows Server 2022)
  hosts: windows
  gather_facts: yes

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false

  roles:
    - role: common
      when: false  # Windows common role not yet implemented
      tags: [common, baseline, windows]

  tasks:
    - name: Display Windows baseline status
      debug:
        msg: "Windows baseline configuration skipped - role not implemented"
      tags: [common]

# =============================================================================
# Phase 2: Database Services (Must run before application servers)
# =============================================================================

- name: Configure Database Server - SQL Server Express (vm-db-01)
  hosts: database
  gather_facts: yes

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false

  roles:
    - role: sqlserver
      tags: [database, sqlserver, windows]

  tasks:
    - name: Display database server status
      debug:
        msg: "SQL Server Express configuration completed on {{ inventory_hostname }}"
      tags: [database, sqlserver]

# =============================================================================
# Phase 3: Application Services
# =============================================================================

- name: Configure Web Server - Nginx (vm-web-01)
  hosts: webserver
  become: yes
  gather_facts: yes

  roles:
    - role: nginx
      tags: [webserver, nginx]

  tasks:
    - name: Display web server status
      debug:
        msg: "Nginx web server configuration completed on {{ inventory_hostname }}"
      tags: [webserver, nginx]

- name: Configure CMS Server - WordPress + MySQL + Postfix (vm-cms-01)
  hosts: cmsserver
  become: yes
  gather_facts: yes

  roles:
    - role: wordpress
      tags: [cms, wordpress]

    - role: postfix
      tags: [mail, postfix]

  tasks:
    - name: Display CMS server status
      debug:
        msg: "WordPress CMS and Postfix mail server configuration completed on {{ inventory_hostname }}"
      tags: [cms, wordpress, mail]

# =============================================================================
# Phase 4: File Services
# =============================================================================

- name: Configure File Server - SMB Shares (vm-fs-01)
  hosts: fileserver
  gather_facts: yes

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false

  roles:
    - role: fileserver
      when: false  # File server role not yet implemented
      tags: [fileserver, windows]

  tasks:
    - name: Display file server status
      debug:
        msg: "File server configuration skipped - role not implemented"
      tags: [fileserver]

# =============================================================================
# Phase 5: Security Hardening (CIS Benchmarks)
# =============================================================================

- name: Apply Security Hardening to Linux VMs
  hosts: linux:!jumphost
  become: yes
  gather_facts: yes

  roles:
    - role: hardening
      when: false  # Hardening role not yet implemented
      tags: [hardening, security, cis]

  tasks:
    - name: Display hardening status
      debug:
        msg: "Security hardening skipped - role not implemented"
      tags: [hardening]

# =============================================================================
# Phase 6: Verification and Summary
# =============================================================================

- name: Verify Deployment - Linux VMs
  hosts: linux:!jumphost
  gather_facts: yes

  vars:
    env_name: "{{ env_name | default('unknown') }}"

  tasks:
    - name: Gather service facts
      service_facts:
      tags: [verify, summary]

    - name: Display deployment summary for Linux VMs
      debug:
        msg: |
          ============================================================
          DEPLOYMENT SUMMARY - {{ inventory_hostname }}
          ============================================================
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          Kernel: {{ ansible_kernel }}
          Architecture: {{ ansible_architecture }}
          IP Address: {{ ansible_default_ipv4.address | default('N/A') }}
          Hostname: {{ ansible_hostname }}
          FQDN: {{ ansible_fqdn }}
          Environment: {{ env_name }}
          Roles: {{ group_names | join(', ') }}
          Uptime: {{ (ansible_uptime_seconds | default(0)) // 3600 }} hours
          ============================================================
      tags: [verify, summary]

- name: Verify Deployment - Windows VMs
  hosts: windows
  gather_facts: yes

  collections:
    - ansible.windows

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
    env_name: "{{ env_name | default('unknown') }}"

  tasks:
    - name: Gather service facts
      ansible.windows.win_service_info:
      tags: [verify, summary]

    - name: Display deployment summary for Windows VMs
      debug:
        msg: |
          ============================================================
          DEPLOYMENT SUMMARY - {{ inventory_hostname }}
          ============================================================
          OS: {{ ansible_os_family }} {{ ansible_distribution_version | default('N/A') }}
          Architecture: {{ ansible_architecture }}
          IP Address: {{ ansible_ip_addresses | default(['N/A']) | first }}
          Hostname: {{ ansible_hostname }}
          FQDN: {{ ansible_fqdn }}
          Environment: {{ env_name }}
          Roles: {{ group_names | join(', ') }}
          ============================================================
      tags: [verify, summary]


# =============================================================================
# Final Status Report
# =============================================================================

- name: Generate Final Status Report
  hosts: localhost
  connection: local
  gather_facts: yes

  vars:
    env_name: "{{ env_name | default('production') }}"

  tasks:
    - name: Display final status
      debug:
        msg: |
          ============================================================
          ANSIBLE DEPLOYMENT COMPLETED!
          ============================================================

          Infrastructure: SC MEDIA SRL
          Environment: {{ env_name }}
          Date: {{ ansible_date_time.date }}
          Time: {{ ansible_date_time.time }}

          VMs Configured:
          {% for host in groups['all'] %}
            - {{ host }} ({{ hostvars[host]['ansible_host'] | default('N/A') }})
          {% endfor %}

          Next Steps:
            1. Test services:
               - Web: http://{{ hostvars['vm-web-01']['ansible_host'] | default('vm-web-01') }}
               - WordPress: http://{{ hostvars['vm-cms-01']['ansible_host'] | default('vm-cms-01') }}

            2. Verify database connectivity:
               ansible database -m win_shell -a "sqlcmd -S localhost -Q 'SELECT @@VERSION'"

            3. Test email:
               ansible cmsserver -m shell -a "echo 'Test' | mail -s 'Test' admin@media-srl.ro"

          Log File: ./ansible.log

          ============================================================
      tags: [always]

# ============================================================
# Notes:
# ============================================================
# - Roles are applied in dependency order to avoid failures
# - Some roles are marked as "when: false" until implemented
# - Use tags to run specific phases: --tags common,nginx
# - Use --limit to target specific hosts: --limit webserver
# - All tasks respect become/privilege escalation settings
# ============================================================

# ============================================================
# Troubleshooting:
# ============================================================
# - Verbose output: ansible-playbook site.yml -vvv
# - Check syntax: ansible-playbook site.yml --syntax-check
# - List hosts: ansible-playbook site.yml --list-hosts
# - List tasks: ansible-playbook site.yml --list-tasks
# - Dry run: ansible-playbook site.yml --check
# ============================================================
