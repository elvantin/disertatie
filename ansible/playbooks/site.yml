# ============================================================
# Main Ansible Playbook - SC MEDIA SRL Infrastructure
# Updated for 6 VMs: Linux Jumphost + 2 Windows + 3 Linux
# ============================================================

---
- name: Setup SSH keys from jumphost to Linux VMs
  import_playbook: setup-ssh-keys.yml
  tags: [ssh-keys, setup]

- name: Configure Jumphost (Linux with GUI + xRDP + Ansible)
  hosts: jumphost
  become: yes
  roles:
    - jumphost
  tags: [jumphost, management]

- name: Configure File Server (Windows)
  hosts: fileserver
  roles:
    - fileserver
  tags: [fileserver, windows]

- name: Configure Database Server (Windows with MS SQL Server 2022)
  hosts: database
  roles:
    - mssql
  tags: [database, mssql, windows]

- name: Configure all Linux VMs with common baseline
  hosts: linux
  become: yes
  roles:
    - common
  tags: [common, baseline, linux]

- name: Configure Windows VMs with common baseline
  hosts: windows
  roles:
    - common
  tags: [common, baseline, windows]

- name: Configure Web Server (vm-web-01)
  hosts: webserver
  become: yes
  roles:
    - nginx
  tags: [webserver, nginx]

- name: Configure CMS Server with WordPress + Postfix (vm-cms-01)
  hosts: cms
  become: yes
  roles:
    - wordpress
    - postfix
  tags: [cms, wordpress, mail]

- name: Apply security hardening to all VMs
  hosts: all
  become: yes
  roles:
    - hardening
  tags: [hardening, security, cis]

- name: Verify deployment
  hosts: all
  become: yes
  tasks:
    - name: Check if all services are running
      ansible.builtin.service_facts:

    - name: Display deployment summary
      ansible.builtin.debug:
        msg: |
          ========================================
          Deployment Summary for {{ inventory_hostname }}
          ========================================
          OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
          IP: {{ ansible_default_ipv4.address | default('N/A') }}
          Hostname: {{ ansible_hostname }}
          Environment: {{ environment | default('unknown') }}
          Role: {{ group_names | join(', ') }}
          ========================================
  tags: [verify, summary]
