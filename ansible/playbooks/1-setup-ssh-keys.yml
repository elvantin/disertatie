---
# ============================================================
# Setup SSH Keys Playbook
# Distributes SSH public key from jumphost to all Linux VMs
# ============================================================
#
# Usage:
#   ansible-playbook playbooks/1-setup-ssh-keys.yml
#
# Prerequisites:
#   - az login performed on jumphost (used for dynamic inventory + run-command)
#   - sshpass installed (already in Packer jumphost image)
#
# How it works:
#   Play 1 — generates/reads the jumphost SSH key pair
#   Play 2 — injects the public key via Azure Run Command (no SSH needed!)
#             bypasses PasswordAuthentication issues on fresh gallery VMs
#   Play 3 — verifies SSH key-based authentication works
#   Play 4 — summary
#
# ============================================================

- name: Generate SSH Key Pair on Jumphost
  hosts: localhost
  connection: local
  gather_facts: yes
  become: no

  vars:
    ssh_key_path: "{{ ansible_env.HOME }}/.ssh/id_rsa"
    ssh_key_type: "rsa"
    ssh_key_bits: 4096
    ssh_key_comment: "jumphost-ansible-automation"

  tasks:
    - name: Check if SSH key pair already exists
      stat:
        path: "{{ ssh_key_path }}"
      register: ssh_key_check

    - name: Display SSH key status
      debug:
        msg: >
          SSH key pair {{ 'already exists' if ssh_key_check.stat.exists else 'does not exist, will be generated' }}
          at {{ ssh_key_path }}

    - name: Ensure .ssh directory exists
      file:
        path: "{{ ansible_env.HOME }}/.ssh"
        state: directory
        mode: '0700'
        owner: "{{ ansible_env.USER }}"

    - name: Generate SSH key pair (if not exists)
      openssh_keypair:
        path: "{{ ssh_key_path }}"
        type: "{{ ssh_key_type }}"
        size: "{{ ssh_key_bits }}"
        comment: "{{ ssh_key_comment }}"
        state: present
      when: not ssh_key_check.stat.exists
      register: ssh_key_generated

    - name: Set correct permissions on SSH private key
      file:
        path: "{{ ssh_key_path }}"
        mode: '0600'
        owner: "{{ ansible_env.USER }}"

    - name: Set correct permissions on SSH public key
      file:
        path: "{{ ssh_key_path }}.pub"
        mode: '0644'
        owner: "{{ ansible_env.USER }}"

    - name: Read SSH public key
      slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_public_key_content

    - name: Display SSH public key
      debug:
        msg: "{{ ssh_public_key_content['content'] | b64decode | trim }}"

    - name: Deploy SSH key to jumphost locally
      authorized_key:
        user: "{{ ansible_env.USER }}"
        state: present
        key: "{{ ssh_public_key_content['content'] | b64decode | trim }}"
        comment: "jumphost-ansible-automation"

    - name: Set SSH public key fact for next plays
      set_fact:
        jumphost_ssh_public_key: "{{ ssh_public_key_content['content'] | b64decode | trim }}"
        cacheable: yes

# ============================================================
# Inject SSH Public Key via Azure Run Command
# ============================================================
# Uses Azure's out-of-band API — no SSH connection to target VMs needed.
# Bypasses PasswordAuthentication issues on fresh gallery image VMs.
# Requires: az login on jumphost (already done for azure_rm inventory).
# resource_group is provided by the azure_rm dynamic inventory plugin.
# ============================================================

- name: Inject SSH Public Key via Azure Run Command
  hosts: localhost
  connection: local
  gather_facts: no
  become: no

  vars:
    target_hosts: "{{ groups['linux'] | difference(groups.get('jumphost', [])) }}"

  tasks:
    - name: Check Azure CLI authentication
      command: az account show --query name -o tsv
      register: az_account
      changed_when: false
      failed_when: false

    - name: Fail with instructions if not authenticated
      fail:
        msg: |
          Azure CLI is not authenticated on this jumphost.

          Please run the following command on the jumphost BEFORE running this playbook:
            az login --use-device-code

          Then re-run:
            ansible-playbook playbooks/1-setup-ssh-keys.yml
      when: az_account.rc != 0

    - name: Display Azure account
      debug:
        msg: "Azure account: {{ az_account.stdout | trim }}"

    - name: Write key injection script to jumphost
      copy:
        dest: /tmp/ansible-inject-ssh-key.sh
        content: |
          #!/bin/bash
          # Decode public key from base64 (avoids quoting issues with SSH key content)
          PUB_KEY=$(printf '%s' '{{ hostvars["localhost"]["jumphost_ssh_public_key"] | b64encode }}' | base64 -d)
          mkdir -p /home/azureadmin/.ssh
          chmod 700 /home/azureadmin/.ssh
          if grep -qxF "$PUB_KEY" /home/azureadmin/.ssh/authorized_keys 2>/dev/null; then
            echo "KEY_ALREADY_EXISTS"
          else
            echo "$PUB_KEY" >> /home/azureadmin/.ssh/authorized_keys
            echo "KEY_ADDED"
          fi
          chmod 600 /home/azureadmin/.ssh/authorized_keys
          chown -R azureadmin:azureadmin /home/azureadmin/.ssh
        mode: '0700'

    - name: Inject SSH key to {{ item }} via Azure Run Command
      command: >
        az vm run-command invoke
        --resource-group "{{ hostvars[item]['resource_group'] }}"
        --name "{{ item }}"
        --command-id RunShellScript
        --scripts @/tmp/ansible-inject-ssh-key.sh
      loop: "{{ target_hosts }}"
      register: inject_results

    - name: Show injection results
      debug:
        msg: "{{ item.item }}: {{ (item.stdout | from_json).value[0].message | default('no output') | trim }}"
      loop: "{{ inject_results.results }}"
      loop_control:
        label: "{{ item.item }}"

    - name: Cleanup injection script
      file:
        path: /tmp/ansible-inject-ssh-key.sh
        state: absent

# ============================================================
# Verify SSH Key-Based Authentication
# ============================================================

- name: Verify SSH Key-Based Authentication
  hosts: linux:!jumphost
  gather_facts: yes

  vars:
    ansible_become: false
    ansible_ssh_private_key_file: "~/.ssh/id_rsa"
    # Verify with key only — no password fallback
    ansible_ssh_common_args: >-
      -o StrictHostKeyChecking=no
      -o UserKnownHostsFile=/dev/null
      -o PreferredAuthentications=publickey
      -o PasswordAuthentication=no

  tasks:
    - name: Test SSH connectivity with key-based auth
      ping:
      register: key_auth_test

    - name: Display host information
      debug:
        msg: |
          Host: {{ inventory_hostname }} ({{ ansible_host }})
          OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
          SSH Key Auth: SUCCESS

# ============================================================
# Summary Report
# ============================================================

- name: SSH Key Setup Summary
  hosts: localhost
  connection: local
  gather_facts: no
  become: no

  tasks:
    - name: Display setup summary
      debug:
        msg: |
          ============================================================
          SSH KEY SETUP COMPLETED
          ============================================================

          SSH Key: ~/.ssh/id_rsa
          Public Key: ~/.ssh/id_rsa.pub

          Linux VMs Configured (via Azure Run Command):
          {% for host in groups['linux'] | difference(groups.get('jumphost', [])) %}
            - {{ host }} ({{ hostvars[host]['ansible_host'] }})
          {% endfor %}

          Next Steps:
            1. Test: ansible linux -m ping
            2. Run baseline: ansible-playbook playbooks/2-site.yml --tags common
            3. Optional: comment out ansible_password in group_vars/linux.yml

          ============================================================
