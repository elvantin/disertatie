---
# ============================================================
# Site Playbook - SC MEDIA SRL Infrastructure
# Complete orchestration for 6 VMs: 1 Jumphost + 2 Windows + 3 Ubuntu
# ============================================================
#
# Purpose:
#   Main orchestration playbook that configures all infrastructure VMs
#   in the correct order to avoid dependency failures
#
# Prerequisites:
#   - Infrastructure deployed via Bicep
#   - Jumphost bootstrapped with Ansible + xRDP
#   - WinRM configured on Windows VMs (scripts/bootstrap-windows-winrm.ps1)
#   - SSH keys distributed to Linux VMs (playbooks/1-setup-ssh-keys.yml)
#
# Usage:
#   # Complete deployment
#   ansible-playbook playbooks/2-site.yml
#
#   # Deploy specific roles
#   ansible-playbook playbooks/2-site.yml --tags common
#   ansible-playbook playbooks/2-site.yml --tags mysql
#   ansible-playbook playbooks/2-site.yml --tags nginx,wordpress
#
#   # Deploy to specific hosts
#   ansible-playbook playbooks/2-site.yml --limit webserver
#   ansible-playbook playbooks/2-site.yml --limit linux
#   ansible-playbook playbooks/2-site.yml --limit windows
#
#   # Dry run (check mode)
#   ansible-playbook playbooks/2-site.yml --check
#
# ============================================================

# =============================================================================
# Phase 1: Baseline Configuration (Common)
# =============================================================================

- name: Configure Linux VMs - Common Baseline (Ubuntu 22.04)
  hosts: linux:!jumphost
  become: true
  gather_facts: true

  roles:
    - role: common
      tags: [common, baseline, linux]

  tasks:
    - name: Display Linux baseline configuration status
      debug:
        msg: "Baseline configuration completed for {{ inventory_hostname }}"
      tags: [common]

- name: Configure Windows VMs - Common Baseline (Windows Server 2022)
  hosts: windows
  gather_facts: true

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
    ansible_password: "{{ vault_admin_password }}"

  roles:
    - role: common
      tags: [common, baseline, windows]

  tasks:
    - name: Display Windows baseline status
      debug:
        msg: "Windows baseline configuration completed for {{ inventory_hostname }}"
      tags: [common]

# =============================================================================
# Phase 1b: Jumphost Post-Configuration (tool connections, shortcuts)
# =============================================================================

- name: Configure Jumphost - Tool Connections (vm-jmp-01)
  hosts: jumphost
  become: true
  gather_facts: true

  roles:
    - role: jumphost
      tags: [jumphost, tools]

  tasks:
    - name: Display jumphost configuration status
      debug:
        msg: "Jumphost post-deployment configuration completed on {{ inventory_hostname }}"
      tags: [jumphost]

# =============================================================================
# Phase 2: Database Services (Must run before application servers)
# =============================================================================

- name: Configure Database Server - MySQL Community Server (vm-db-01)
  hosts: database
  gather_facts: true

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
    ansible_password: "{{ vault_admin_password }}"

  roles:
    - role: mysql
      tags: [database, mysql, windows]

  tasks:
    - name: Display database server status
      debug:
        msg: "MySQL Community Server configuration completed on {{ inventory_hostname }}"
      tags: [database, mysql]

# =============================================================================
# Phase 3: Application Services
# =============================================================================

- name: Configure Web Server - Nginx (vm-web-01)
  hosts: webserver
  become: true
  gather_facts: true

  roles:
    - role: nginx
      tags: [webserver, nginx]

  tasks:
    - name: Display web server status
      debug:
        msg: "Nginx web server configuration completed on {{ inventory_hostname }}"
      tags: [webserver, nginx]

- name: Configure Application Server - Nginx Backend API (vm-app-01)
  hosts: appserver
  become: true
  gather_facts: true

  roles:
    - role: appserver
      tags: [appserver, nginx]

  tasks:
    - name: Display app server status
      debug:
        msg: "Application server (nginx backend) configuration completed on {{ inventory_hostname }}"
      tags: [appserver]

- name: Configure CMS Server - WordPress + MySQL + Postfix (vm-cms-01)
  hosts: cmsserver
  become: true
  gather_facts: true

  roles:
    - role: wordpress
      tags: [cms, wordpress]

    - role: postfix
      tags: [mail, postfix]

  tasks:
    - name: Display CMS server status
      debug:
        msg: "WordPress CMS and Postfix mail server configuration completed on {{ inventory_hostname }}"
      tags: [cms, wordpress, mail]

# =============================================================================
# Phase 4: File Services
# =============================================================================

- name: Configure File Server - SMB Shares (vm-fs-01)
  hosts: fileserver
  gather_facts: true

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
    ansible_password: "{{ vault_admin_password }}"

  roles:
    - role: fileserver
      tags: [fileserver, windows]

  tasks:
    - name: Display file server status
      debug:
        msg: "File server configuration completed on {{ inventory_hostname }}"
      tags: [fileserver]

# =============================================================================
# Phase 5: Security Hardening (CIS Benchmarks)
# =============================================================================

- name: Apply Security Hardening to Linux VMs
  hosts: linux:!jumphost
  become: true
  gather_facts: true

  roles:
    - role: hardening
      tags: [hardening, security, cis]

  tasks:
    - name: Display hardening status
      debug:
        msg: "Security hardening completed on {{ inventory_hostname }}"
      tags: [hardening]

# =============================================================================
# Phase 6: Verification and Summary
# =============================================================================

- name: Verify Deployment - Linux VMs
  hosts: linux:!jumphost
  gather_facts: true

  vars:
    env_name: "productie"

  tasks:
    - name: Gather service facts
      service_facts:
      tags: [verify, summary]

    - name: Display deployment summary for Linux VMs
      debug:
        msg: |
          ============================================================
          DEPLOYMENT SUMMARY - {{ inventory_hostname }}
          ============================================================
          OS:          {{ ansible_distribution }} {{ ansible_distribution_version }}  (kernel {{ ansible_kernel }})
          IP Address:  {{ ansible_default_ipv4.address | default('N/A') }}
          Role:        {{ group_names | reject('match', '^tag_') | reject('equalto', 'linux') | reject('equalto', 'all') | reject('equalto', 'ungrouped') | list | join(', ') }}
          Environment: {{ group_names | select('match', '^tag_environment_') | map('regex_replace', '^tag_environment_', '') | first | default(env_name) }}
          Uptime:      {{ (ansible_uptime_seconds | default(0)) // 3600 }} hours
          ============================================================
      tags: [verify, summary]

- name: Verify Deployment - Windows VMs
  hosts: windows
  gather_facts: true

  collections:
    - ansible.windows

  vars:
    ansible_connection: winrm
    ansible_port: 5985
    ansible_winrm_transport: ntlm
    ansible_winrm_server_cert_validation: ignore
    ansible_become: false
    ansible_password: "{{ vault_admin_password }}"
    env_name: "productie"

  tasks:
    - name: Gather service facts
      ansible.windows.win_service_info:
      tags: [verify, summary]

    - name: Display deployment summary for Windows VMs
      debug:
        msg: |
          ============================================================
          DEPLOYMENT SUMMARY - {{ inventory_hostname }}
          ============================================================
          OS:          Windows Server 2022  ({{ ansible_distribution_version | default('N/A') }})
          IP Address:  {{ ansible_ip_addresses | default([]) | select('match', '^[0-9.]+$') | reject('equalto', '127.0.0.1') | list | first | default('N/A') }}
          Role:        {{ group_names | reject('match', '^tag_') | reject('equalto', 'windows') | reject('equalto', 'all') | reject('equalto', 'ungrouped') | list | join(', ') }}
          Environment: {{ group_names | select('match', '^tag_environment_') | map('regex_replace', '^tag_environment_', '') | first | default(env_name) }}
          ============================================================
      tags: [verify, summary]


# =============================================================================
# Phase 7: SSL Certificate Validation — Auto-obtain Let's Encrypt if needed
# =============================================================================
# Logic:
#   1. Check on vm-web-01 whether the current cert is issued by Let's Encrypt
#   2. On localhost (jumphost): if NOT LE cert → chmod +x + run certbot script
#      If LE cert is valid → skip silently
# The certbot script handles: NSG port 80 open → certbot → nginx reload → NSG close

- name: Check SSL Certificate on vm-web-01
  hosts: webserver
  become: true
  gather_facts: false
  tags: [ssl, certbot]

  tasks:
    # certbot certificates is the authoritative source: reads from /etc/letsencrypt/renewal/
    # and shows (VALID: X days) only for real LE certs — unaffected by live/ symlink state.
    - name: Query certbot for certificate status
      ansible.builtin.command: certbot certificates
      register: certbot_certs
      changed_when: false
      failed_when: false

    - name: Set ssl_is_letsencrypt fact
      ansible.builtin.set_fact:
        ssl_is_letsencrypt: "{{ '(VALID:' in (certbot_certs.stdout | default('')) }}"

    - name: Display SSL certificate status
      ansible.builtin.debug:
        msg: |
          Certbot status on {{ inventory_hostname }}:
          {% for line in certbot_certs.stdout_lines | default([]) %}
            {{ line }}
          {% endfor %}
          is_letsencrypt={{ ssl_is_letsencrypt }}

- name: Auto-obtain Let's Encrypt Certificate (if needed)
  hosts: localhost
  connection: local
  gather_facts: false
  become: false
  tags: [ssl, certbot]

  tasks:
    - name: Read SSL status from vm-web-01
      ansible.builtin.set_fact:
        ssl_valid: "{{ hostvars['vm-web-01']['ssl_is_letsencrypt'] | default(false) | bool }}"

    - name: "[SSL OK] Let's Encrypt certificate is valid — skipping certbot"
      ansible.builtin.debug:
        msg: >-
          Let's Encrypt certificate is valid and HTTPS is operational.
          No action needed. Certbot script will NOT run.
      when: ssl_valid

    - name: "[SSL NEEDED] Make certbot script executable"
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../scripts/certbot-letsencrypt.sh"
        mode: '0755'
      when: not ssl_valid

    - name: "[SSL NEEDED] Obtain Let's Encrypt certificate via certbot script"
      ansible.builtin.command:
        cmd: "{{ playbook_dir }}/../scripts/certbot-letsencrypt.sh"
        chdir: "{{ playbook_dir }}/.."
      register: certbot_run
      when: not ssl_valid
      timeout: 900
      failed_when: certbot_run.rc | default(0) != 0

    - name: "[SSL NEEDED] Display certbot output"
      ansible.builtin.debug:
        msg: "{{ certbot_run.stdout_lines | default([]) }}"
      when:
        - not ssl_valid
        - certbot_run is defined and certbot_run is not skipped

# =============================================================================
# Final Status Report
# =============================================================================

- name: Generate Final Status Report
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  tasks:
    - name: Display final status
      debug:
        msg: |
          ============================================================
          ANSIBLE DEPLOYMENT COMPLETED!
          ============================================================
          Infrastructure:  SC MEDIA SRL
          Domain:          {{ hostvars['vm-web-01']['website_domain'] | default('mediasrl.swedencentral.cloudapp.azure.com') }}
          Date/Time:       {{ ansible_date_time.date }}  {{ ansible_date_time.time }}

          VMs Deployed:
          {% set infra_hosts = groups['all'] | reject('equalto', 'localhost') | list | sort %}
          {% for host in infra_hosts %}
          {% set host_role = hostvars[host]['group_names'] | reject('match', '^tag_') | reject('equalto', 'linux') | reject('equalto', 'windows') | reject('equalto', 'all') | reject('equalto', 'ungrouped') | list | join(', ') %}
            {{ host }}  {{ hostvars[host]['ansible_host'] | default('N/A') }}  [{{ host_role }}]
          {% endfor %}

          Access Points (via Azure public IP / jumphost):
            Website:    https://{{ hostvars['vm-web-01']['website_domain'] | default('mediasrl.swedencentral.cloudapp.azure.com') }}
            API:        https://{{ hostvars['vm-web-01']['website_domain'] | default('mediasrl.swedencentral.cloudapp.azure.com') }}/api/
            WordPress:  http://{{ hostvars['vm-cms-01']['ansible_host'] | default('vm-cms-01') }}  (via jumphost)
            Jumphost:   ssh azureadmin@{{ hostvars['vm-jmp-01']['ansible_host'] | default('vm-jmp-01') }}

          Log File:  ./ansible.log
          ============================================================
      tags: [always]

# ============================================================
# Notes:
# ============================================================
# - Roles are applied in dependency order to avoid failures
# - All roles are active and implemented
# - Use tags to run specific phases: --tags common,nginx
# - Use --limit to target specific hosts: --limit webserver
# - All tasks respect become/privilege escalation settings
# ============================================================

# ============================================================
# Troubleshooting:
# ============================================================
# - Verbose output: ansible-playbook site.yml -vvv
# - Check syntax: ansible-playbook site.yml --syntax-check
# - List hosts: ansible-playbook site.yml --list-hosts
# - List tasks: ansible-playbook site.yml --list-tasks
# - Dry run: ansible-playbook site.yml --check
# ============================================================
