---
# ============================================================
# Setup SSH Keys Playbook
# Distributes SSH public key from jumphost to all Linux VMs
# ============================================================
#
# Usage:
#   ansible-playbook playbooks/setup-ssh-keys.yml
#
# Prerequisites:
#   - ansible_password defined in group_vars/linux.yml
#   - sshpass installed on jumphost: sudo apt install -y sshpass
#
# ============================================================

- name: Generate SSH Key Pair on Jumphost
  hosts: localhost
  connection: local
  gather_facts: yes
  become: no

  vars:
    ssh_key_path: "{{ ansible_env.HOME }}/.ssh/id_rsa"
    ssh_key_type: "rsa"
    ssh_key_bits: 4096
    ssh_key_comment: "jumphost-ansible-automation"

  tasks:
    - name: Check if SSH key pair already exists
      stat:
        path: "{{ ssh_key_path }}"
      register: ssh_key_check

    - name: Display SSH key status
      debug:
        msg: >
          SSH key pair {{ 'already exists' if ssh_key_check.stat.exists else 'does not exist, will be generated' }}
          at {{ ssh_key_path }}

    - name: Generate SSH key pair (if not exists)
      openssh_keypair:
        path: "{{ ssh_key_path }}"
        type: "{{ ssh_key_type }}"
        size: "{{ ssh_key_bits }}"
        comment: "{{ ssh_key_comment }}"
        state: present
      when: not ssh_key_check.stat.exists
      register: ssh_key_generated

    - name: Set correct permissions on SSH private key
      file:
        path: "{{ ssh_key_path }}"
        mode: '0600'
        owner: "{{ ansible_env.USER }}"

    - name: Set correct permissions on SSH public key
      file:
        path: "{{ ssh_key_path }}.pub"
        mode: '0644'
        owner: "{{ ansible_env.USER }}"

    - name: Read SSH public key
      slurp:
        src: "{{ ssh_key_path }}.pub"
      register: ssh_public_key_content

    - name: Display SSH public key
      debug:
        msg: "{{ ssh_public_key_content['content'] | b64decode | trim }}"

    - name: Deploy SSH key to jumphost locally
      authorized_key:
        user: "{{ ansible_env.USER }}"
        state: present
        key: "{{ ssh_public_key_content['content'] | b64decode | trim }}"
        comment: "jumphost-ansible-automation"

    - name: Set SSH public key fact for next play
      set_fact:
        jumphost_ssh_public_key: "{{ ssh_public_key_content['content'] | b64decode | trim }}"
        cacheable: yes

# ============================================================
# Deploy SSH Public Key to Linux VMs (excluding jumphost)
# ============================================================

- name: Deploy SSH Public Key to Linux VMs
  hosts: linux:!jumphost
  gather_facts: no
  become: no

  tasks:
    - name: Wait for SSH port to be available
      wait_for:
        host: "{{ ansible_host }}"
        port: 22
        timeout: 60
      delegate_to: localhost
      connection: local

    - name: Deploy SSH public key to authorized_keys
      authorized_key:
        user: "{{ ansible_user }}"
        state: present
        key: "{{ hostvars['localhost']['jumphost_ssh_public_key'] }}"
        comment: "jumphost-ansible-automation"
        exclusive: no
      register: key_deployment

    - name: Display key deployment status
      debug:
        msg: "SSH key deployed to {{ inventory_hostname }} ({{ ansible_host }}): {{ 'SUCCESS' if key_deployment is succeeded else 'FAILED' }}"

# ============================================================
# Verify SSH Key-Based Authentication
# ============================================================

- name: Verify SSH Key-Based Authentication
  hosts: linux:!jumphost
  gather_facts: yes
  become: no

  vars:
    ansible_ssh_private_key_file: "~/.ssh/id_rsa"

  tasks:
    - name: Test SSH connectivity with key-based auth
      ping:
      register: key_auth_test

    - name: Display host information
      debug:
        msg: |
          Host: {{ inventory_hostname }} ({{ ansible_host }})
          OS: {{ ansible_facts['distribution'] }} {{ ansible_facts['distribution_version'] }}
          SSH Key Auth: SUCCESS

# ============================================================
# Summary Report
# ============================================================

- name: SSH Key Setup Summary
  hosts: localhost
  connection: local
  gather_facts: no

  tasks:
    - name: Display setup summary
      debug:
        msg: |
          ============================================================
          SSH KEY SETUP COMPLETED
          ============================================================

          SSH Key: ~/.ssh/id_rsa
          Public Key: ~/.ssh/id_rsa.pub

          Linux VMs Configured:
          {% for host in groups['linux'] %}
            - {{ host }} ({{ hostvars[host]['ansible_host'] }})
          {% endfor %}

          Next Steps:
            1. Test: ansible linux -m ping
            2. Run baseline: ansible-playbook playbooks/site.yml --tags common
            3. Optionally comment out ansible_password in group_vars/linux.yml

          ============================================================
