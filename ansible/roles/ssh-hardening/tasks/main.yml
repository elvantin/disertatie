---
# ============================================================
# Ansible Role: ssh-hardening
# Enforces strong ciphers/MACs/KexAlgorithms via drop-in config
# Does NOT modify /etc/ssh/sshd_config directly — uses sshd_config.d/
# ============================================================

- name: Ensure sshd_config.d directory exists
  ansible.builtin.file:
    path: /etc/ssh/sshd_config.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [ssh_hardening]

- name: Deploy SSH hardening drop-in config
  ansible.builtin.template:
    src: sshd_hardening.conf.j2
    dest: /etc/ssh/sshd_config.d/99-hardening.conf
    owner: root
    group: root
    mode: '0600'
    backup: true
    validate: /usr/sbin/sshd -t -f %s
  notify: restart sshd
  tags: [ssh_hardening]

- name: Deploy SSH login banner
  ansible.builtin.copy:
    dest: /etc/ssh/banner.txt
    content: "{{ ssh_banner_text }}"
    owner: root
    group: root
    mode: '0644'
  tags: [ssh_hardening]

# Validate sshd config before restarting
- name: Validate sshd configuration
  ansible.builtin.command: sshd -t
  changed_when: false
  register: sshd_validate
  failed_when: sshd_validate.rc != 0
  tags: [ssh_hardening]

- name: Restart sshd to apply hardening
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  tags: [ssh_hardening]

# Moduli hardening: remove DH groups smaller than 3072 bits
# (protects against Logjam attack)
- name: Remove weak Diffie-Hellman moduli (< 3072 bits)
  ansible.builtin.shell: |
    if [ -f /etc/ssh/moduli ]; then
      # Keep only lines with moduli >= 3072 bits (field 5 >= 3071)
      awk '$5 >= 3071' /etc/ssh/moduli > /etc/ssh/moduli.safe
      if [ -s /etc/ssh/moduli.safe ]; then
        mv /etc/ssh/moduli.safe /etc/ssh/moduli
        echo "Moduli hardened: weak DH groups removed"
      else
        rm -f /etc/ssh/moduli.safe
        echo "No weak moduli found or moduli file empty — skipped"
      fi
    fi
  register: moduli_result
  changed_when: "'hardened' in moduli_result.stdout"
  tags: [ssh_hardening]

- name: Show moduli hardening result
  ansible.builtin.debug:
    msg: "{{ moduli_result.stdout }}"
  tags: [ssh_hardening]
