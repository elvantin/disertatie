---
# ============================================================
# Ansible Role: sqlserver
# Installs and configures SQL Server Express 2022 on Windows Server
# Target: vm-db-01
# ============================================================

- name: Create temporary directory for SQL Server installation
  win_file:
    path: "{{ temp_directory }}"
    state: directory
  tags: [sqlserver, prereq]

- name: Create SQL Server data directories
  win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - "{{ sqlserver_data_path }}"
    - "{{ sqlserver_log_path }}"
    - "{{ sqlserver_backup_path }}"
    - "{{ sqlserver_tempdb_path }}"
  tags: [sqlserver, prereq, directories]

- name: Check if SQL Server is already installed
  win_service:
    name: "MSSQL${{ sqlserver_instance_name }}"
  register: sqlserver_service_check
  failed_when: false
  tags: [sqlserver, check]

- name: Display SQL Server installation status
  debug:
    msg: "SQL Server {{ sqlserver_instance_name }} is {{ 'already installed' if sqlserver_service_check.exists else 'not installed' }}"
  tags: [sqlserver, check]

- name: Download SQL Server Express installer
  win_get_url:
    url: "{{ sqlserver_download_url }}"
    dest: "{{ sqlserver_installer_path }}"
    timeout: 600
  when: not sqlserver_service_check.exists
  register: sqlserver_download
  tags: [sqlserver, download]

- name: Extract SQL Server installer
  win_shell: |
    Start-Process -FilePath "{{ sqlserver_installer_path }}" -ArgumentList "/Q", "/X:{{ sqlserver_extracted_path }}" -Wait
  when: not sqlserver_service_check.exists and sqlserver_download.changed
  tags: [sqlserver, extract]

- name: Install SQL Server Express 2022
  win_shell: |
    $ErrorActionPreference = "Stop"

    # SQL Server installation parameters
    $setupPath = "{{ sqlserver_extracted_path }}\\setup.exe"
    $configFile = "{{ temp_directory }}\\ConfigurationFile.ini"

    # Create configuration file
    $configContent = @"
    [OPTIONS]
    ACTION="Install"
    FEATURES={{ sqlserver_features | join(',') }}
    INSTANCENAME="{{ sqlserver_instance_name }}"
    INSTANCEID="{{ sqlserver_instance_name }}"
    SQLSVCACCOUNT="{{ sqlserver_service_account }}"
    SQLSYSADMINACCOUNTS="BUILTIN\Administrators"
    SECURITYMODE="{{ 'SQL' if sqlserver_auth_mode == 'Mixed' else '' }}"
    {% if sqlserver_auth_mode == 'Mixed' %}
    SAPWD="{{ sqlserver_sa_password }}"
    {% endif %}
    SQLUSERDBDIR="{{ sqlserver_data_path }}"
    SQLUSERDBLOGDIR="{{ sqlserver_log_path }}"
    SQLBACKUPDIR="{{ sqlserver_backup_path }}"
    SQLTEMPDBDIR="{{ sqlserver_tempdb_path }}"
    SQLTEMPDBLOGDIR="{{ sqlserver_tempdb_path }}"
    SQLCOLLATION="{{ sqlserver_collation }}"
    TCPENABLED="{{ '1' if sqlserver_tcp_enabled else '0' }}"
    QUIET="True"
    QUIETSIMPLE="False"
    INDICATEPROGRESS="False"
    IACCEPTSQLSERVERLICENSETERMS="True"
    SUPPRESSPRIVACYSTATEMENTNOTICE="True"
    "@

    # Write configuration file
    Set-Content -Path $configFile -Value $configContent -Force

    # Run SQL Server installation
    $process = Start-Process -FilePath $setupPath -ArgumentList "/ConfigurationFile=`"$configFile`"" -Wait -PassThru -NoNewWindow

    if ($process.ExitCode -ne 0 -and $process.ExitCode -ne 3010) {
        throw "SQL Server installation failed with exit code: $($process.ExitCode)"
    }

    Write-Output "SQL Server installation completed with exit code: $($process.ExitCode)"
  when: not sqlserver_service_check.exists
  register: sqlserver_install
  tags: [sqlserver, install]

- name: Wait for SQL Server service to be available
  win_service:
    name: "MSSQL${{ sqlserver_instance_name }}"
    state: started
  register: sqlserver_service_start
  retries: 10
  delay: 30
  until: sqlserver_service_start is succeeded
  when: not sqlserver_service_check.exists or sqlserver_install.changed
  tags: [sqlserver, service]

- name: Configure SQL Server TCP/IP protocol
  win_shell: |
    $ErrorActionPreference = "Stop"

    # Import SQL Server module
    Import-Module SqlServer -ErrorAction SilentlyContinue

    # Load SMO assemblies
    [System.Reflection.Assembly]::LoadWithPartialName('Microsoft.SqlServer.SqlWmiManagement') | Out-Null

    # Get SQL Server instance
    $wmi = New-Object ('Microsoft.SqlServer.Management.Smo.Wmi.ManagedComputer')
    $instance = $wmi.ServerInstances | Where-Object { $_.Name -eq '{{ sqlserver_instance_name }}' }

    if ($instance) {
        # Get TCP protocol
        $tcp = $instance.ServerProtocols | Where-Object { $_.Name -eq 'Tcp' }

        if ($tcp) {
            # Enable TCP/IP
            $tcp.IsEnabled = $true
            $tcp.Alter()

            # Set TCP port
            $ipAll = $tcp.IPAddresses | Where-Object { $_.Name -eq 'IPAll' }
            $ipAll.IPAddressProperties['TcpPort'].Value = '{{ sqlserver_tcp_port }}'
            $ipAll.IPAddressProperties['TcpDynamicPorts'].Value = ''
            $tcp.Alter()

            Write-Output "TCP/IP protocol configured on port {{ sqlserver_tcp_port }}"
        }
    }
  when: sqlserver_tcp_enabled
  notify: restart sqlserver
  tags: [sqlserver, config, tcp]

- name: Configure Windows Firewall for SQL Server
  win_firewall_rule:
    name: "SQL Server (TCP-In)"
    localport: "{{ sqlserver_tcp_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: yes
  when: sqlserver_firewall_enabled
  tags: [sqlserver, firewall]

- name: Create WordPress database
  win_shell: |
    $ErrorActionPreference = "Stop"

    # SQL Server connection
    $serverInstance = "localhost\{{ sqlserver_instance_name }}"

    # Check if database exists
    $query = "SELECT name FROM sys.databases WHERE name = '{{ wordpress_database_name }}'"
    $result = Invoke-Sqlcmd -ServerInstance $serverInstance -Query $query -ErrorAction SilentlyContinue

    if (-not $result) {
        # Create database
        $createDb = @"
        CREATE DATABASE [{{ wordpress_database_name }}]
        ON PRIMARY
        ( NAME = '{{ wordpress_database_name }}',
          FILENAME = '{{ sqlserver_data_path }}\{{ wordpress_database_name }}.mdf',
          SIZE = 100MB,
          MAXSIZE = UNLIMITED,
          FILEGROWTH = 10MB )
        LOG ON
        ( NAME = '{{ wordpress_database_name }}_log',
          FILENAME = '{{ sqlserver_log_path }}\{{ wordpress_database_name }}_log.ldf',
          SIZE = 50MB,
          MAXSIZE = UNLIMITED,
          FILEGROWTH = 10MB )
    "@
        Invoke-Sqlcmd -ServerInstance $serverInstance -Query $createDb
        Write-Output "Database {{ wordpress_database_name }} created successfully"
    } else {
        Write-Output "Database {{ wordpress_database_name }} already exists"
    }
  register: create_database
  changed_when: "'created successfully' in create_database.stdout"
  tags: [sqlserver, database]

- name: Create WordPress database user
  win_shell: |
    $ErrorActionPreference = "Stop"

    $serverInstance = "localhost\{{ sqlserver_instance_name }}"

    # Check if login exists
    $checkLogin = "SELECT name FROM sys.sql_logins WHERE name = '{{ wordpress_database_user }}'"
    $loginExists = Invoke-Sqlcmd -ServerInstance $serverInstance -Query $checkLogin -ErrorAction SilentlyContinue

    if (-not $loginExists) {
        # Create SQL login
        $createLogin = @"
        CREATE LOGIN [{{ wordpress_database_user }}]
        WITH PASSWORD = '{{ wordpress_database_password }}',
        DEFAULT_DATABASE = [{{ wordpress_database_name }}],
        CHECK_POLICY = OFF,
        CHECK_EXPIRATION = OFF
    "@
        Invoke-Sqlcmd -ServerInstance $serverInstance -Query $createLogin

        # Create database user
        $createUser = @"
        USE [{{ wordpress_database_name }}]
        CREATE USER [{{ wordpress_database_user }}] FOR LOGIN [{{ wordpress_database_user }}]
        ALTER ROLE db_owner ADD MEMBER [{{ wordpress_database_user }}]
    "@
        Invoke-Sqlcmd -ServerInstance $serverInstance -Query $createUser

        Write-Output "User {{ wordpress_database_user }} created successfully"
    } else {
        Write-Output "User {{ wordpress_database_user }} already exists"
    }
  register: create_user
  changed_when: "'created successfully' in create_user.stdout"
  tags: [sqlserver, database, user]

- name: Download SQL Server Management Studio (SSMS)
  win_get_url:
    url: "{{ sqlserver_ssms_download_url }}"
    dest: "{{ temp_directory }}\\SSMS-Setup-ENU.exe"
    timeout: 600
  when: sqlserver_install_ssms and not sqlserver_service_check.exists
  register: ssms_download
  tags: [sqlserver, ssms, download]

- name: Install SQL Server Management Studio (SSMS)
  win_shell: |
    Start-Process -FilePath "{{ temp_directory }}\SSMS-Setup-ENU.exe" -ArgumentList "/install", "/quiet", "/norestart" -Wait
  when: sqlserver_install_ssms and ssms_download.changed
  tags: [sqlserver, ssms, install]

- name: Verify SQL Server installation
  win_shell: |
    $serverInstance = "localhost\{{ sqlserver_instance_name }}"
    $query = "SELECT @@VERSION AS Version, @@SERVERNAME AS ServerName, SERVERPROPERTY('Edition') AS Edition"
    Invoke-Sqlcmd -ServerInstance $serverInstance -Query $query | Format-List
  register: sqlserver_version
  tags: [sqlserver, verify]

- name: Display SQL Server configuration
  debug:
    msg: |
      ============================================================
      SQL Server Express Configuration Completed
      ============================================================
      Server: {{ inventory_hostname }}
      Instance: {{ sqlserver_instance_name }}
      Edition: {{ sqlserver_edition }}
      TCP Port: {{ sqlserver_tcp_port }}
      Authentication: {{ sqlserver_auth_mode }}

      WordPress Database Configuration:
        Database: {{ wordpress_database_name }}
        User: {{ wordpress_database_user }}
        Connection String: Server={{ inventory_hostname }}\{{ sqlserver_instance_name }};Database={{ wordpress_database_name }};User Id={{ wordpress_database_user }};Password=***;

      SQL Server Version:
      {{ sqlserver_version.stdout }}
      ============================================================
  tags: [sqlserver, verify]

- name: Cleanup installation files
  win_file:
    path: "{{ item }}"
    state: absent
  loop:
    - "{{ sqlserver_installer_path }}"
    - "{{ sqlserver_extracted_path }}"
    - "{{ temp_directory }}\\ConfigurationFile.ini"
  when: sqlserver_install.changed
  tags: [sqlserver, cleanup]
