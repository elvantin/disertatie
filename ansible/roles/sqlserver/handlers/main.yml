---
# ============================================================
# Ansible Role: sqlserver - Handlers
# ============================================================

- name: restart sqlserver
  win_service:
    name: "MSSQL${{ sqlserver_instance_name }}"
    state: restarted
  tags: [sqlserver, service]

- name: restart sql agent
  win_service:
    name: "SQLAgent${{ sqlserver_instance_name }}"
    state: restarted
  failed_when: false  # SQL Agent might not be available in Express edition
  tags: [sqlserver, service]
