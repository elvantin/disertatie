# ============================================================
# Ansible Role: postfix
# Installs and configures Postfix mail server on vm-cms-01
# ============================================================

- name: Install Postfix and related packages
  ansible.builtin.apt:
    name:
      - postfix
      - bsd-mailx
      - libsasl2-modules
      - sasl2-bin
    state: present
  tags: [postfix, packages]

- name: Configure Postfix main.cf
  ansible.builtin.template:
    src: main.cf.j2
    dest: /etc/postfix/main.cf
    owner: root
    group: root
    mode: '0644'
  notify: restart postfix
  tags: [postfix, config]

- name: Configure Postfix master.cf
  ansible.builtin.template:
    src: master.cf.j2
    dest: /etc/postfix/master.cf
    owner: root
    group: root
    mode: '0644'
  notify: restart postfix
  tags: [postfix, config]

- name: Create mail aliases
  ansible.builtin.lineinfile:
    path: /etc/aliases
    regexp: '^root:'
    line: 'root: admin@mediasrl.ro'
    create: yes
  notify: newaliases
  tags: [postfix, aliases]

- name: Configure firewall for SMTP
  ansible.posix.firewalld:
    service: smtp
    permanent: yes
    state: enabled
    immediate: yes
  tags: [postfix, firewall]

- name: Restart Postfix to apply current configuration
  ansible.builtin.systemd:
    name: postfix
    enabled: yes
    state: restarted
  tags: [postfix, service]

- name: Capture Postfix journal logs for diagnostics
  ansible.builtin.shell: journalctl -u postfix --no-pager -n 40 --output=short 2>&1
  register: postfix_journal
  changed_when: false
  failed_when: false
  tags: [postfix, service]

- name: Show Postfix journal (useful if verify fails)
  ansible.builtin.debug:
    msg: "{{ postfix_journal.stdout_lines }}"
  tags: [postfix, service]

- name: Verify Postfix is listening on port 25
  ansible.builtin.wait_for:
    port: 25
    delay: 3
    timeout: 30
  tags: [postfix, verify]
