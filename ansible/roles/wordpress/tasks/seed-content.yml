---
# ============================================================
# WordPress Content Seeding
# Uses WP-CLI to install WordPress and populate with demo content
# Target: vm-cms-01
# ============================================================

- name: Check if WordPress is already installed
  command: wp core is-installed --path={{ wordpress_install_dir }}
  register: wp_installed
  changed_when: false
  failed_when: false
  become: true
  become_user: "{{ wordpress_user }}"
  tags: [wordpress, seed]

- name: Install WordPress core via WP-CLI
  command: >
    wp core install
    --path={{ wordpress_install_dir }}
    --url="{{ wordpress_site_url }}"
    --title="{{ wordpress_site_title }}"
    --admin_user="{{ wordpress_admin_user }}"
    --admin_password="{{ wordpress_admin_password }}"
    --admin_email="{{ wordpress_admin_email }}"
    --skip-email
  become: true
  become_user: "{{ wordpress_user }}"
  when: wp_installed.rc != 0
  tags: [wordpress, seed]

# ============================================================
# WordPress Settings
# ============================================================

- name: Configure WordPress settings
  # Single PHP process (wp eval) instead of 10 separate `wp option update`
  # invocations — each wp-cli command pays its own PHP bootstrap cost.
  # permalink_structure is set separately by "Set permalink structure" below
  # (wp rewrite structure also flushes/regenerates rewrite rules).
  command: >
    wp eval '
    update_option("blogname", "SC MEDIA SRL");
    update_option("blogdescription", "Agentie de PR, Marketing Digital si Comunicare Strategica");
    update_option("timezone_string", "Europe/Bucharest");
    update_option("date_format", "j F Y");
    update_option("time_format", "H:i");
    update_option("WPLANG", "ro_RO");
    update_option("posts_per_page", 6);
    update_option("default_ping_status", "closed");
    update_option("default_comment_status", "closed");
    ' --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed, settings]

- name: Set permalink structure
  command: wp rewrite structure '/%postname%/' --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed, settings]

# ============================================================
# Create Pages
# ============================================================

- name: Check if seed content already exists
  command: wp post list --post_type=page --field=title --path={{ wordpress_install_dir }}
  register: existing_pages
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed]

- name: Create page - Acasa (Home)
  command: >
    wp post create
    --post_type=page
    --post_title='Acasa'
    --post_status=publish
    --post_content='{{ lookup("file", "pages/acasa.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  register: page_home
  when: "'Acasa' not in existing_pages.stdout"
  tags: [wordpress, seed, pages]

- name: Create page - Despre Noi
  command: >
    wp post create
    --post_type=page
    --post_title='Despre Noi'
    --post_status=publish
    --post_content='{{ lookup("file", "pages/despre-noi.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'Despre Noi' not in existing_pages.stdout"
  tags: [wordpress, seed, pages]

- name: Create page - Servicii
  command: >
    wp post create
    --post_type=page
    --post_title='Servicii'
    --post_status=publish
    --post_content='{{ lookup("file", "pages/servicii.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'Servicii' not in existing_pages.stdout"
  tags: [wordpress, seed, pages]

- name: Create page - Portofoliu
  command: >
    wp post create
    --post_type=page
    --post_title='Portofoliu'
    --post_status=publish
    --post_content='{{ lookup("file", "pages/portofoliu.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'Portofoliu' not in existing_pages.stdout"
  tags: [wordpress, seed, pages]

- name: Create page - Contact
  command: >
    wp post create
    --post_type=page
    --post_title='Contact'
    --post_status=publish
    --post_content='{{ lookup("file", "pages/contact.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'Contact' not in existing_pages.stdout"
  tags: [wordpress, seed, pages]

# ============================================================
# Set Homepage
# ============================================================

- name: Get Acasa page ID
  command: wp post list --post_type=page --title='Acasa' --field=ID --path={{ wordpress_install_dir }}
  register: home_page_id
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed, settings]

- name: Set static front page
  command: >
    wp eval '
    update_option("show_on_front", "page");
    update_option("page_on_front", {{ home_page_id.stdout | trim }});
    ' --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: home_page_id.stdout | trim | length > 0
  changed_when: false
  tags: [wordpress, seed, settings]

# ============================================================
# Create Blog Posts
# ============================================================

- name: Check existing blog posts
  command: wp post list --post_type=post --field=title --path={{ wordpress_install_dir }}
  register: existing_posts
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed]

- name: Create blog post 1
  command: >
    wp post create
    --post_type=post
    --post_title='Cum sa-ti construiesti o strategie de PR eficienta in 2026'
    --post_status=publish
    --post_content='{{ lookup("file", "posts/strategie-pr.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'strategie de PR' not in existing_posts.stdout"
  tags: [wordpress, seed, posts]

- name: Create blog post 2
  command: >
    wp post create
    --post_type=post
    --post_title='5 tendinte in Social Media Marketing pentru afaceri mici'
    --post_status=publish
    --post_content='{{ lookup("file", "posts/tendinte-social-media.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'Social Media' not in existing_posts.stdout"
  tags: [wordpress, seed, posts]

- name: Create blog post 3
  command: >
    wp post create
    --post_type=post
    --post_title='Studiu de caz - Campania de rebranding TechVision SRL'
    --post_status=publish
    --post_content='{{ lookup("file", "posts/studiu-caz-techvision.html") }}'
    --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  when: "'TechVision' not in existing_posts.stdout"
  tags: [wordpress, seed, posts]

# ============================================================
# Theme: restore Twenty Twenty-Four (default WordPress FSE theme)
# ============================================================

- name: Activate Twenty Twenty-Four theme (default WordPress FSE theme)
  command: >
    wp theme activate twentytwentyfour
    --path={{ wordpress_install_dir }}
    --allow-root
  register: theme_activate
  changed_when: true
  failed_when: false
  tags: [wordpress, seed, theme]

# ============================================================
# Fix FSE navigation
# Twenty Twenty-Four is a Full Site Editing (FSE) theme.
# Navigation is stored as a wp_navigation post, not a classic menu.
# This task replaces the default placeholder links (Blog, About, FAQs…)
# with actual links to our pages.
# ============================================================

- name: Remove default FSE navigation placeholder links
  # Twenty Twenty-Four ships with placeholder nav links (Blog, About, FAQs…).
  # Clears the wp_navigation post so no broken links appear in the header.
  shell: |
    WP="wp --path={{ wordpress_install_dir }}"
    NAV_ID=$($WP post list --post_type=wp_navigation --field=ID 2>/dev/null | head -1)
    if [[ -n "$NAV_ID" ]]; then
      $WP post update "$NAV_ID" --post_content="" --post_status=publish
      echo "Navigation cleared (post ID: $NAV_ID)"
    else
      echo "No wp_navigation post found — nothing to clear"
    fi
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: true
  tags: [wordpress, seed, menu]

# ============================================================
# Delete default content
# ============================================================

- name: Delete default Hello World post and Sample Page
  command: wp post delete 1 2 --force --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  failed_when: false
  changed_when: false
  tags: [wordpress, seed, cleanup]

- name: Flush WordPress rewrite rules
  command: wp rewrite flush --path={{ wordpress_install_dir }}
  become: true
  become_user: "{{ wordpress_user }}"
  changed_when: false
  tags: [wordpress, seed]

- name: Display seed content status
  debug:
    msg: |
      ============================================================
      WordPress Content Seeded Successfully
      ============================================================
      Pages: Acasa, Despre Noi, Servicii, Portofoliu, Contact
      Blog Posts: 3 articles
      Homepage: Set to static page (Acasa)
      Language: Romanian (ro_RO)
      Timezone: Europe/Bucharest
      ============================================================
  tags: [wordpress, seed]
