---
# ============================================================
# Ansible Role: wordpress
# Installs and configures WordPress CMS on Ubuntu 22.04
# Target: vm-cms-01
# Database: MySQL Community 8.0 (remote vm-db-01, port 3306)
# ============================================================

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  register: apt_update
  retries: 3
  delay: 10
  until: apt_update is succeeded
  tags: [wordpress, packages]

- name: Install Nginx
  apt:
    name: nginx
    state: present
  tags: [wordpress, nginx, packages]

- name: Install PHP and required extensions
  apt:
    name:
      - "php{{ php_version }}"
      - "php{{ php_version }}-fpm"
      - "php{{ php_version }}-mysql"
      - "php{{ php_version }}-gd"
      - "php{{ php_version }}-xml"
      - "php{{ php_version }}-mbstring"
      - "php{{ php_version }}-curl"
      - "php{{ php_version }}-zip"
      - "php{{ php_version }}-intl"
      - "php{{ php_version }}-soap"
      - "php{{ php_version }}-bcmath"
      - "php{{ php_version }}-imagick"
      - php-cli
      - php-common
    state: present
  register: php_install
  retries: 3
  delay: 10
  until: php_install is succeeded
  tags: [wordpress, php, packages]

- name: Install MySQL/MariaDB server
  apt:
    name:
      - mariadb-server
      - mariadb-client
      - python3-pymysql
    state: present
  when: mysql_install_local
  register: mysql_install
  retries: 3
  delay: 10
  until: mysql_install is succeeded
  tags: [wordpress, mysql, packages]

- name: Start and enable MySQL service
  systemd:
    name: mariadb
    state: started
    enabled: yes
  when: mysql_install_local
  tags: [wordpress, mysql, service]

- name: Set MySQL root password
  mysql_user:
    name: root
    password: "{{ mysql_root_password }}"
    login_unix_socket: /var/run/mysqld/mysqld.sock
    state: present
  when: mysql_install_local
  no_log: true
  tags: [wordpress, mysql, config]

- name: Create WordPress MySQL database
  mysql_db:
    name: "{{ wordpress_db_name }}"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  when: mysql_install_local
  tags: [wordpress, mysql, database]

- name: Create WordPress MySQL user
  mysql_user:
    name: "{{ wordpress_db_user }}"
    password: "{{ wordpress_db_password }}"
    priv: "{{ wordpress_db_name }}.*:ALL"
    host: "localhost"
    state: present
    login_user: root
    login_password: "{{ mysql_root_password }}"
  when: mysql_install_local
  no_log: true
  tags: [wordpress, mysql, user]

- name: Create WordPress directory structure
  file:
    path: "{{ item }}"
    state: directory
    owner: "{{ wordpress_user }}"
    group: "{{ wordpress_group }}"
    mode: '0755'
  loop:
    - "{{ wordpress_install_dir }}"
    - "{{ wordpress_document_root }}"
  tags: [wordpress, directories]

- name: Download WordPress
  get_url:
    url: "{{ wordpress_download_url }}"
    dest: /tmp/wordpress.tar.gz
    mode: '0644'
    timeout: 300
  register: wordpress_download
  tags: [wordpress, download]

- name: Extract WordPress archive
  unarchive:
    src: /tmp/wordpress.tar.gz
    dest: "{{ wordpress_install_dir }}"
    remote_src: yes
    owner: "{{ wordpress_user }}"
    group: "{{ wordpress_group }}"
    extra_opts: [--strip-components=1]
    creates: "{{ wordpress_install_dir }}/wp-config-sample.php"
  tags: [wordpress, extract]

- name: Configure WordPress wp-config.php
  template:
    src: wp-config.php.j2
    dest: "{{ wordpress_install_dir }}/wp-config.php"
    owner: "{{ wordpress_user }}"
    group: "{{ wordpress_group }}"
    mode: '0640'
  tags: [wordpress, config]

- name: Set correct permissions on WordPress files
  file:
    path: "{{ wordpress_install_dir }}"
    state: directory
    owner: "{{ wordpress_user }}"
    group: "{{ wordpress_group }}"
    recurse: yes
  tags: [wordpress, permissions]

- name: Create PHP-FPM required directories
  file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop:
    - /var/log/php-fpm
    - /var/lib/php/session
    - /var/lib/php/wsdlcache
  tags: [wordpress, php-fpm, directories]

- name: Remove default PHP-FPM pool
  file:
    path: "/etc/php/{{ php_version }}/fpm/pool.d/www.conf"
    state: absent
  notify: restart php-fpm
  tags: [wordpress, php-fpm, config]

- name: Configure PHP-FPM pool for WordPress
  template:
    src: wordpress-pool.conf.j2
    dest: "/etc/php/{{ php_version }}/fpm/pool.d/wordpress.conf"
    owner: root
    group: root
    mode: '0644'
  notify: restart php-fpm
  tags: [wordpress, php-fpm, config]

- name: Configure Nginx virtual host for WordPress
  template:
    src: wordpress-nginx.conf.j2
    dest: /etc/nginx/sites-available/wordpress.conf
    owner: root
    group: root
    mode: '0644'
    backup: yes
  notify: reload nginx
  tags: [wordpress, nginx, config]

- name: Enable WordPress Nginx site
  file:
    src: /etc/nginx/sites-available/wordpress.conf
    dest: /etc/nginx/sites-enabled/wordpress.conf
    state: link
  notify: reload nginx
  tags: [wordpress, nginx]

- name: Remove default Nginx site
  file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [wordpress, nginx]

- name: Validate Nginx configuration
  command: nginx -t
  register: nginx_validate
  changed_when: false
  failed_when: nginx_validate.rc != 0
  tags: [wordpress, nginx, validate]

- name: Configure firewalld for HTTP and HTTPS
  ansible.posix.firewalld:
    port: "{{ item }}/tcp"
    permanent: true
    state: enabled
    immediate: true
  loop:
    - "{{ wordpress_nginx_port }}"
    - "443"
  tags: [wordpress, firewall]

- name: Flush handlers before starting services
  meta: flush_handlers
  tags: [wordpress, service]

- name: Enable and start PHP-FPM service
  systemd:
    name: "php{{ php_version }}-fpm"
    enabled: yes
    state: started
  tags: [wordpress, php-fpm, service]

- name: Reload PHP-FPM to ensure latest configuration
  systemd:
    name: "php{{ php_version }}-fpm"
    state: reloaded
  tags: [wordpress, php-fpm, service]

- name: Enable and start Nginx service
  systemd:
    name: nginx
    enabled: yes
    state: started
  tags: [wordpress, nginx, service]

- name: Reload Nginx to ensure latest configuration
  systemd:
    name: nginx
    state: reloaded
  tags: [wordpress, nginx, service]

- name: Install WP-CLI
  get_url:
    url: https://raw.githubusercontent.com/wp-cli/builds/gh-pages/phar/wp-cli.phar
    dest: /usr/local/bin/wp
    mode: '0755'
  tags: [wordpress, wp-cli]

# ── Verify database connectivity before running WP-CLI ───────────────────────
# wp core install fails immediately if the DB port is not yet reachable.
# Retry for up to 90 seconds to handle MySQL startup delays on vm-db-01.
- name: Verify database port reachable from CMS server
  ansible.builtin.command: >
    python3 -c "import socket; s = socket.create_connection(('{{ wordpress_db_host }}', {{ wordpress_db_port }}), timeout=10); s.close(); print('DB port {{ wordpress_db_port }} reachable on {{ wordpress_db_host }}')"
  register: db_port_check
  changed_when: false
  retries: 9
  delay: 10
  until: db_port_check.rc == 0
  tags: [wordpress, wp-cli, database]

# ── WordPress core install (runs only if not already installed) ───────────────
- name: Check if WordPress is already installed
  ansible.builtin.command: >
    wp core is-installed
    --path={{ wordpress_install_dir }}
    --allow-root
  register: wp_is_installed
  changed_when: false
  failed_when: false
  tags: [wordpress, wp-cli]

- name: Install WordPress core via WP-CLI
  ansible.builtin.command: >
    wp core install
    --path={{ wordpress_install_dir }}
    --url="{{ wordpress_site_url }}"
    --title="{{ wordpress_site_title }}"
    --admin_user="{{ wordpress_admin_user }}"
    --admin_password="{{ wordpress_admin_password }}"
    --admin_email="{{ wordpress_admin_email }}"
    --skip-email
    --allow-root
  register: wp_install_result
  when: wp_is_installed.rc != 0
  no_log: true
  retries: 2
  delay: 15
  until: wp_install_result.rc == 0
  tags: [wordpress, wp-cli]

- name: Confirm WordPress core install result
  debug:
    msg: >-
      WP core install: {{
        'SKIPPED (already installed)' if wp_install_result is skipped
        else 'SUCCESS - ' + (wp_install_result.stdout | default(''))
      }}
  when: wp_install_result is not skipped or wp_install_result is skipped
  tags: [wordpress, wp-cli]

# ── Fix siteurl/home in DB (in case WordPress was installed with wrong URL) ───
# WP_HOME/WP_SITEURL constants in wp-config.php override DB values at runtime,
# but we also update DB for consistency (admin dashboard, CLI commands, etc.)
- name: Update WordPress siteurl option in database
  ansible.builtin.command: >
    wp option update siteurl "{{ wordpress_site_url }}"
    --path={{ wordpress_install_dir }}
    --allow-root
  changed_when: true
  failed_when: false
  tags: [wordpress, wp-cli]

- name: Update WordPress home option in database
  ansible.builtin.command: >
    wp option update home "{{ wordpress_site_url }}"
    --path={{ wordpress_install_dir }}
    --allow-root
  changed_when: true
  failed_when: false
  tags: [wordpress, wp-cli]

- name: Create WordPress cron job for scheduled tasks
  cron:
    name: "WordPress Cron"
    minute: "*/15"
    job: "cd {{ wordpress_install_dir }} && /usr/bin/php wp-cron.php > /dev/null 2>&1"
    user: "{{ wordpress_user }}"
  tags: [wordpress, cron]

- name: Wait for WordPress to be accessible
  uri:
    url: "http://localhost:{{ wordpress_nginx_port }}"
    status_code: [200, 301, 302]
    timeout: 30
  register: wordpress_check
  retries: 3
  delay: 5
  until: wordpress_check.status in [200, 301, 302]
  tags: [wordpress, verify]

- name: Display WordPress configuration status
  debug:
    msg: |
      ============================================================
      WordPress CMS Configuration Completed
      ============================================================
      Server: {{ inventory_hostname }}
      Installation Path: {{ wordpress_install_dir }}
      Site URL: {{ wordpress_site_url }}
      Database: {{ wordpress_db_name }} on {{ wordpress_db_host }}
      PHP Version: {{ php_version }}
      Nginx Port: {{ wordpress_nginx_port }}

      Access Points:
        Site:  {{ wordpress_site_url }}
        Admin: {{ wordpress_site_url }}/wp-admin
        Login: {{ wordpress_admin_user }} (see vault for password)

      WP-CLI:
        wp theme list --path={{ wordpress_install_dir }} --allow-root
        wp plugin list --path={{ wordpress_install_dir }} --allow-root
        wp user list --path={{ wordpress_install_dir }} --allow-root

      ============================================================
  tags: [wordpress, verify]

- name: Cleanup installation files
  file:
    path: /tmp/wordpress.tar.gz
    state: absent
  when: wordpress_download.changed
  tags: [wordpress, cleanup]

# ============================================================
# Phase: Seed demo content (pages, posts, settings)
# ============================================================

- name: Include WordPress content seeding tasks
  include_tasks: seed-content.yml
  tags: [wordpress, seed]
