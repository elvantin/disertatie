---
# ============================================================
# Debian/Ubuntu-specific tasks
# Baseline configuration for Ubuntu 22.04 LTS
# ============================================================

# unattended-upgrades runs at boot and holds /var/lib/dpkg/lock-frontend.
# Wait up to 5 minutes for it to finish before any apt operation.
- name: Wait for automatic system updates to release apt/dpkg locks
  shell: |
    for i in $(seq 1 60); do
      if ! fuser /var/lib/dpkg/lock-frontend >/dev/null 2>&1 && \
         ! fuser /var/lib/dpkg/lock          >/dev/null 2>&1 && \
         ! fuser /var/lib/apt/lists/lock     >/dev/null 2>&1; then
        exit 0
      fi
      sleep 5
    done
    exit 0
  changed_when: false
  timeout: 310

- name: Update apt cache
  apt:
    update_cache: yes
    cache_valid_time: 3600
  register: apt_update
  retries: 3
  delay: 10
  until: apt_update is succeeded

# ── All apt-install tasks grouped BEFORE the async upgrade ────────────────────
# apt upgrade: dist runs async below; it holds the dpkg lock for its entire
# duration. All other apt operations must complete before it starts.

- name: Remove UFW and replace with firewalld
  block:

    - name: Check if UFW is installed
      command: which ufw
      register: ufw_check
      changed_when: false
      failed_when: false

    - name: Disable UFW rules
      command: ufw disable
      when: ufw_check.rc == 0
      changed_when: false

    - name: Stop and disable UFW service
      service:
        name: ufw
        state: stopped
        enabled: no
      when: ufw_check.rc == 0

    - name: Uninstall UFW package
      apt:
        name: ufw
        state: absent
        purge: yes
      when: ufw_check.rc == 0
      register: ufw_remove
      retries: 5
      delay: 15
      until: ufw_remove is succeeded

- name: Install common packages
  apt:
    name: "{{ common_packages }}"
    state: present
  register: apt_install_common
  retries: 3
  delay: 10
  until: apt_install_common is succeeded

- name: Install security packages
  apt:
    name: "{{ security_packages }}"
    state: present
  register: apt_install_security
  retries: 3
  delay: 10
  until: apt_install_security is succeeded

- name: Ensure python3-apt is installed (required for Ansible apt module)
  apt:
    name: python3-apt
    state: present

# ── Start full upgrade async after all other apt tasks are done ───────────────
# async: 3600 — job valid on remote for up to 1 hour.
# poll: 0     — fire-and-forget; Ansible moves to the next task immediately.
# The dpkg lock is held by this background job; NO further apt tasks should
# run after this point (and none do — all installs are above).
# Verification is at the end of this file, after all non-apt config tasks.
- name: Upgrade all packages to the latest version (async)
  apt:
    upgrade: dist
    autoremove: yes
    autoclean: yes
  async: 3600
  poll: 0
  register: apt_upgrade_job

# ── Non-apt configuration runs while the upgrade is in the background ─────────

- name: Configure unattended-upgrades for automatic security updates
  block:
    - name: Enable automatic updates
      copy:
        dest: /etc/apt/apt.conf.d/20auto-upgrades
        content: |
          APT::Periodic::Update-Package-Lists "1";
          APT::Periodic::Download-Upgradeable-Packages "1";
          APT::Periodic::AutocleanInterval "7";
          APT::Periodic::Unattended-Upgrade "{{ '1' if auto_updates_enabled else '0' }}";
        mode: '0644'
      when: auto_updates_enabled

    - name: Configure unattended-upgrades settings
      template:
        src: 50unattended-upgrades.j2
        dest: /etc/apt/apt.conf.d/50unattended-upgrades
        mode: '0644'
      when: auto_updates_enabled
      notify: restart unattended-upgrades
  when: auto_updates_enabled

- name: Ensure firewalld is enabled and running
  service:
    name: firewalld
    state: started
    enabled: yes
  when: firewall_enabled

- name: Configure firewalld allowed ports
  ansible.posix.firewalld:
    port: "{{ item }}"
    permanent: true
    state: enabled
    zone: "{{ firewalld_default_zone }}"
    immediate: true
  loop: "{{ firewall_allowed_ports }}"
  when: firewall_enabled

- name: Configure SSH hardening
  block:
    - name: Backup original sshd_config
      copy:
        src: /etc/ssh/sshd_config
        dest: /etc/ssh/sshd_config.backup
        remote_src: yes
        force: no

    - name: Configure SSH daemon settings
      lineinfile:
        path: /etc/ssh/sshd_config
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
        state: present
        validate: '/usr/sbin/sshd -t -f %s'
      loop:
        - { regexp: '^#?Port', line: 'Port {{ ssh_port }}' }
        - { regexp: '^#?PermitRootLogin', line: 'PermitRootLogin {{ ssh_permit_root_login }}' }
        - { regexp: '^#?PasswordAuthentication', line: 'PasswordAuthentication {{ ssh_password_authentication }}' }
        - { regexp: '^#?PermitEmptyPasswords', line: 'PermitEmptyPasswords {{ ssh_permit_empty_passwords }}' }
        - { regexp: '^#?MaxAuthTries', line: 'MaxAuthTries {{ ssh_max_auth_tries }}' }
        - { regexp: '^#?MaxSessions', line: 'MaxSessions {{ ssh_max_sessions }}' }
        - { regexp: '^#?ClientAliveInterval', line: 'ClientAliveInterval {{ ssh_client_alive_interval }}' }
        - { regexp: '^#?ClientAliveCountMax', line: 'ClientAliveCountMax {{ ssh_client_alive_count_max }}' }
      notify: restart sshd
  when: ssh_hardening_enabled

- name: Configure kernel parameters for security (sysctl)
  sysctl:
    name: "{{ item.name }}"
    value: "{{ item.value }}"
    state: present
    reload: yes
    sysctl_file: /etc/sysctl.d/99-security-hardening.conf
  loop:
    - { name: 'net.ipv4.ip_forward', value: '0' }
    - { name: 'net.ipv6.conf.all.forwarding', value: '0' }
    - { name: 'net.ipv4.conf.all.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.accept_redirects', value: '0' }
    - { name: 'net.ipv6.conf.all.accept_redirects', value: '0' }
    - { name: 'net.ipv6.conf.default.accept_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.secure_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.secure_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.default.send_redirects', value: '0' }
    - { name: 'net.ipv4.conf.all.accept_source_route', value: '0' }
    - { name: 'net.ipv4.conf.default.accept_source_route', value: '0' }
    - { name: 'net.ipv6.conf.all.accept_source_route', value: '0' }
    - { name: 'net.ipv6.conf.default.accept_source_route', value: '0' }
    - { name: 'net.ipv4.conf.all.log_martians', value: '1' }
    - { name: 'net.ipv4.conf.default.log_martians', value: '1' }
    - { name: 'net.ipv4.icmp_echo_ignore_all', value: '0' }
    - { name: 'net.ipv4.icmp_echo_ignore_broadcasts', value: '1' }
    - { name: 'net.ipv4.icmp_ignore_bogus_error_responses', value: '1' }
    - { name: 'net.ipv4.tcp_syncookies', value: '1' }
    - { name: 'net.ipv4.conf.all.rp_filter', value: '1' }
    - { name: 'net.ipv4.conf.default.rp_filter', value: '1' }
    - { name: 'fs.file-max', value: '65536' }
    - { name: 'kernel.kptr_restrict', value: '2' }
    - { name: 'kernel.dmesg_restrict', value: '1' }
  when: kernel_hardening_enabled

- name: Set hostname
  hostname:
    name: "{{ inventory_hostname }}"

- name: Update /etc/hosts file
  lineinfile:
    path: /etc/hosts
    regexp: '^127\.0\.1\.1'
    line: "127.0.1.1 {{ inventory_hostname }}"
    state: present

# ── Wait for the background apt upgrade to finish ─────────────────────────────
# Polls every 30s; retries * delay = 3600s matches async: above.
- name: Wait for package upgrade to complete
  ansible.builtin.async_status:
    jid: "{{ apt_upgrade_job.ansible_job_id }}"
  register: apt_upgrade_result
  until: apt_upgrade_result.finished
  retries: 120
  delay: 30

- name: Display baseline configuration status
  debug:
    msg: |
      ============================================================
      Ubuntu Baseline Configuration Completed
      ============================================================
      Hostname: {{ inventory_hostname }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }}
      Kernel: {{ ansible_kernel }}
      Packages upgraded: {{ apt_upgrade_result.changed }}
      Firewall enabled: {{ firewall_enabled }}
      SSH hardening: {{ ssh_hardening_enabled }}
      Kernel hardening: {{ kernel_hardening_enabled }}
      Automatic updates: {{ auto_updates_enabled }}
      ============================================================
