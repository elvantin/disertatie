# ============================================================
# Configure NTP/Time synchronization
# ============================================================

# ----- Linux (Rocky Linux with chronyd) -----

- name: Install chrony for NTP (Linux)
  ansible.builtin.dnf:
    name: chrony
    state: present
  when: ansible_os_family == 'RedHat'
  tags: [ntp, linux]

- name: Configure chrony NTP servers (Linux)
  ansible.builtin.template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
  when: ansible_os_family == 'RedHat'
  notify: restart chronyd
  tags: [ntp, linux, config]

- name: Enable and start chronyd service (Linux)
  ansible.builtin.systemd:
    name: chronyd
    enabled: yes
    state: started
  when: ansible_os_family == 'RedHat'
  tags: [ntp, linux]

# ----- Windows -----

- name: Configure Windows Time Service
  ansible.windows.win_shell: |
    w32tm /config /manualpeerlist:"time.windows.com,time.google.com" /syncfromflags:manual /reliable:YES /update
    Restart-Service w32time
  when: ansible_os_family == 'Windows'
  tags: [ntp, windows]

- name: Ensure Windows Time service is running
  ansible.windows.win_service:
    name: w32time
    start_mode: auto
    state: started
  when: ansible_os_family == 'Windows'
  tags: [ntp, windows]
