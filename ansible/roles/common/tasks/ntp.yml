---
# ============================================================
# Configure NTP/Time synchronization
# ============================================================

# ----- Ubuntu/Debian with systemd-timesyncd -----

- name: Configure systemd-timesyncd NTP servers (Ubuntu/Debian)
  template:
    src: timesyncd.conf.j2
    dest: /etc/systemd/timesyncd.conf
    owner: root
    group: root
    mode: '0644'
  when: ansible_os_family == 'Debian'
  notify: restart systemd-timesyncd
  tags: [ntp, linux, config]

- name: Enable and start systemd-timesyncd service (Ubuntu/Debian)
  systemd:
    name: systemd-timesyncd
    enabled: yes
    state: started
  when: ansible_os_family == 'Debian'
  tags: [ntp, linux]

- name: Verify time synchronization status (Ubuntu/Debian)
  command: timedatectl status
  register: timedatectl_status
  changed_when: false
  when: ansible_os_family == 'Debian'
  tags: [ntp, linux]

- name: Display time sync status (Ubuntu/Debian)
  debug:
    msg: "{{ timedatectl_status.stdout_lines }}"
  when: ansible_os_family == 'Debian'
  tags: [ntp, linux]

# ----- RedHat/Rocky Linux with chronyd -----

- name: Install chrony for NTP (RedHat)
  dnf:
    name: chrony
    state: present
  when: ansible_os_family == 'RedHat'
  tags: [ntp, linux]

- name: Configure chrony NTP servers (RedHat)
  template:
    src: chrony.conf.j2
    dest: /etc/chrony.conf
    owner: root
    group: root
    mode: '0644'
  when: ansible_os_family == 'RedHat'
  notify: restart chronyd
  tags: [ntp, linux, config]

- name: Enable and start chronyd service (RedHat)
  systemd:
    name: chronyd
    enabled: yes
    state: started
  when: ansible_os_family == 'RedHat'
  tags: [ntp, linux]

# ----- Windows -----

- name: Configure Windows Time Service
  win_shell: |
    w32tm /config /manualpeerlist:"time.windows.com,time.google.com" /syncfromflags:manual /reliable:YES /update
    Restart-Service w32time
  when: ansible_os_family == 'Windows'
  tags: [ntp, windows]

- name: Ensure Windows Time service is running
  win_service:
    name: w32time
    start_mode: auto
    state: started
  when: ansible_os_family == 'Windows'
  tags: [ntp, windows]
