# ============================================================
# System-wide security configuration
# ============================================================

# ----- Linux Security -----

- name: Disable root login via SSH (Linux)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^PermitRootLogin'
    line: 'PermitRootLogin no'
    state: present
  when: ansible_os_family != 'Windows'
  notify: restart sshd
  tags: [security, ssh, linux]

# Remove old cipher block injected directly into sshd_config (replaced by
# ssh-hardening role which uses /etc/ssh/sshd_config.d/99-hardening.conf).
# This block had incorrect MACs (non-ETM included) and incomplete KexAlgorithms.
- name: Remove old SSH cipher block from sshd_config (managed by ssh-hardening role)
  ansible.builtin.blockinfile:
    path: /etc/ssh/sshd_config
    marker: "# {mark} ANSIBLE MANAGED - SSH CIPHERS"
    state: absent
  when: ansible_os_family != 'Windows'
  notify: restart sshd
  tags: [security, ssh, linux, hardening]

# Ensure drop-in directory is included — critical for 99-hardening.conf to be loaded.
# Ubuntu 22.04 has this by default but Packer images or manual edits may have removed it.
- name: Ensure sshd_config includes drop-in directory
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^Include /etc/ssh/sshd_config\.d/\*\.conf'
    line: 'Include /etc/ssh/sshd_config.d/*.conf'
    insertbefore: BOF
    state: present
  when: ansible_os_family != 'Windows'
  notify: restart sshd
  tags: [security, ssh, linux]

- name: Set correct permissions on sensitive files (Linux)
  ansible.builtin.file:
    path: "{{ item }}"
    mode: '0600'
    owner: root
    group: root
  loop:
    - /etc/ssh/sshd_config
    - /etc/shadow
    - /etc/gshadow
  when: ansible_os_family != 'Windows'
  tags: [security, permissions, linux]

# ----- Windows Security -----

- name: Configure Windows password policy
  ansible.windows.win_shell: |
    net accounts /minpwlen:14
    net accounts /maxpwage:90
    net accounts /minpwage:1
    net accounts /uniquepw:5
  when: ansible_os_family == 'Windows'
  tags: [security, windows, password]

- name: Configure Windows account lockout policy
  ansible.windows.win_shell: |
    net accounts /lockoutthreshold:5
    net accounts /lockoutduration:30
    net accounts /lockoutwindow:30
  when: ansible_os_family == 'Windows'
  tags: [security, windows, lockout]
