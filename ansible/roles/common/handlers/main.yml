# ============================================================
# Ansible Role: common - Handlers
# ============================================================

- name: restart sshd
  ansible.builtin.systemd:
    name: sshd
    state: restarted
  when: ansible_os_family != 'Windows'

- name: restart chronyd
  ansible.builtin.systemd:
    name: chronyd
    state: restarted
  when: ansible_os_family == 'RedHat'

- name: restart firewalld
  ansible.builtin.systemd:
    name: firewalld
    state: restarted
  when: ansible_os_family == 'RedHat'
