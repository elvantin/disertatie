---
# ============================================================
# Ansible Role: jumphost
# Post-deployment configuration for the Ubuntu jumphost VM
# (GUI apps, tool connections, desktop shortcuts, bookmarks)
# ============================================================

# ============================================================
# Timezone — Europe/Bucharest
# (common role excludes jumphost, so we set it here directly)
# ============================================================

- name: Set timezone to Europe/Bucharest
  community.general.timezone:
    name: Europe/Bucharest
  tags: [jumphost, timezone]

# ============================================================
# Firefox — install + pre-configured bookmarks via policy
# ============================================================

- name: Install Firefox
  ansible.builtin.apt:
    name: firefox
    state: present
    update_cache: yes
  tags: [jumphost, firefox]

- name: Create Firefox system policy directory
  ansible.builtin.file:
    path: /etc/firefox/policies
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [jumphost, firefox]

- name: Deploy Firefox bookmarks and homepage policy
  ansible.builtin.template:
    src: firefox-policies.json.j2
    dest: /etc/firefox/policies/policies.json
    owner: root
    group: root
    mode: '0644'
  tags: [jumphost, firefox]

# ============================================================
# MySQL Workbench — pre-configured connection to vm-db-01
# ============================================================

- name: Create MySQL Workbench config directory
  file:
    path: "/home/{{ ansible_user }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - .mysql
    - .mysql/workbench
  tags: [jumphost, mysql-workbench]

- name: Deploy MySQL Workbench connections.xml (db connection to vm-db-01)
  template:
    src: workbench-connections.xml.j2
    dest: "/home/{{ ansible_user }}/.mysql/workbench/connections.xml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    force: no  # do not overwrite if the user already customized their connections
  tags: [jumphost, mysql-workbench]
