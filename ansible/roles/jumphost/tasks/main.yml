---
# ============================================================
# Ansible Role: jumphost
# Post-deployment configuration for the Ubuntu jumphost VM
# (GUI apps, tool connections, desktop shortcuts)
# ============================================================

# ============================================================
# MySQL Workbench — pre-configured connection to vm-db-01
# ============================================================

- name: Create MySQL Workbench config directory
  file:
    path: "/home/{{ ansible_user }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - .mysql
    - .mysql/workbench
  tags: [jumphost, mysql-workbench]

- name: Deploy MySQL Workbench connections.xml (db connection to vm-db-01)
  template:
    src: workbench-connections.xml.j2
    dest: "/home/{{ ansible_user }}/.mysql/workbench/connections.xml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    force: no  # do not overwrite if the user already customized their connections
  tags: [jumphost, mysql-workbench]
