# ============================================================
# Ansible Role: jumphost
# Configures Rocky Linux jumphost with GUI, xRDP, Ansible, DevOps tools
# ============================================================

- name: Install GNOME Desktop Environment
  ansible.builtin.dnf:
    name: '@^graphical-server-environment'
    state: present
  tags: [jumphost, gui, desktop]

- name: Set graphical target as default
  ansible.builtin.command: systemctl set-default graphical.target
  changed_when: false
  tags: [jumphost, gui]

- name: Install xRDP for Remote Desktop access
  ansible.builtin.dnf:
    name:
      - xrdp
      - xrdp-selinux
    state: present
  tags: [jumphost, xrdp]

- name: Configure xRDP
  ansible.builtin.lineinfile:
    path: /etc/xrdp/xrdp.ini
    regexp: '^port='
    line: 'port=3389'
    state: present
  notify: restart xrdp
  tags: [jumphost, xrdp, config]

- name: Enable and start xRDP service
  ansible.builtin.systemd:
    name: xrdp
    enabled: yes
    state: started
  tags: [jumphost, xrdp, service]

- name: Configure firewall for RDP (port 3389)
  ansible.posix.firewalld:
    port: 3389/tcp
    permanent: yes
    state: enabled
    immediate: yes
  tags: [jumphost, firewall, rdp]

- name: Install Ansible and dependencies
  ansible.builtin.dnf:
    name:
      - ansible
      - python3-pip
      - python3-winrm
      - sshpass
    state: present
  tags: [jumphost, ansible]

- name: Install Azure CLI
  ansible.builtin.shell: |
    rpm --import https://packages.microsoft.com/keys/microsoft.asc
    dnf install -y https://packages.microsoft.com/config/rhel/9.0/packages-microsoft-prod.rpm
    dnf install -y azure-cli
  args:
    creates: /usr/bin/az
  tags: [jumphost, azure-cli]

- name: Install DevOps tools
  ansible.builtin.dnf:
    name:
      - git
      - vim
      - nano
      - wget
      - curl
      - htop
      - tmux
      - screen
      - net-tools
      - bind-utils
      - tcpdump
      - nmap
      - telnet
      - nc
      - jq
      - tree
    state: present
  tags: [jumphost, tools]

- name: Install xfreerdp (RDP client for connecting to Windows VMs)
  ansible.builtin.dnf:
    name: freerdp
    state: present
  tags: [jumphost, freerdp]

- name: Install Visual Studio Code repository
  ansible.builtin.yum_repository:
    name: vscode
    description: Visual Studio Code
    baseurl: https://packages.microsoft.com/yumrepos/vscode
    gpgcheck: yes
    gpgkey: https://packages.microsoft.com/keys/microsoft.asc
    enabled: yes
  tags: [jumphost, vscode]

- name: Install Visual Studio Code
  ansible.builtin.dnf:
    name: code
    state: present
  tags: [jumphost, vscode]

- name: Generate SSH key pair for ansible user
  ansible.builtin.user:
    name: "{{ ansible_user }}"
    generate_ssh_key: yes
    ssh_key_bits: 4096
    ssh_key_file: .ssh/id_rsa
    ssh_key_comment: "ansible@{{ inventory_hostname }}"
  tags: [jumphost, ssh-key]

- name: Fetch SSH public key
  ansible.builtin.slurp:
    src: "/home/{{ ansible_user }}/.ssh/id_rsa.pub"
  register: jumphost_ssh_pubkey
  tags: [jumphost, ssh-key]

- name: Save SSH public key as fact
  ansible.builtin.set_fact:
    jumphost_public_key: "{{ jumphost_ssh_pubkey.content | b64decode }}"
  tags: [jumphost, ssh-key]

- name: Display SSH public key
  ansible.builtin.debug:
    msg: "Jumphost SSH public key: {{ jumphost_public_key }}"
  tags: [jumphost, ssh-key]

- name: Create Ansible workspace directory
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/ansible-workspace"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  tags: [jumphost, workspace]

- name: Configure SELinux for xRDP
  ansible.posix.seboolean:
    name: xrdp_can_network_connect
    state: yes
    persistent: yes
  when: ansible_selinux.status == 'enabled'
  tags: [jumphost, selinux, xrdp]

- name: Create welcome message
  ansible.builtin.copy:
    dest: /etc/motd
    content: |
      ==========================================
      SC MEDIA SRL - DevOps Jumphost
      ==========================================

      Hostname: {{ ansible_hostname }}
      IP: {{ ansible_default_ipv4.address }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }}

      Tools installed:
      - Ansible (ansible --version)
      - Azure CLI (az --version)
      - Git, VS Code, xfreerdp
      - RDP port: 3389

      SSH to Linux VMs:
        ssh azureadmin@vm-web-01
        ssh azureadmin@vm-app-01
        ssh azureadmin@vm-cms-01

      RDP to Windows File Server:
        xfreerdp /v:vm-fs-01 /u:azureadmin /cert:ignore

      Ansible workspace: ~/ansible-workspace
      ==========================================
    owner: root
    group: root
    mode: '0644'
  tags: [jumphost, motd]
