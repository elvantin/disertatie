---
# ============================================================
# Ansible Role: jumphost
# Post-deployment configuration for the Ubuntu jumphost VM
# (GUI apps, tool connections, desktop shortcuts, bookmarks)
# ============================================================

# ============================================================
# SSH — ensure password authentication is enabled
# common role excludes jumphost, so SSH config must be set here.
# Azure cloud-init (50-cloud-init.conf) may set PasswordAuthentication no —
# overrides Azure cloud-init restriction to allow password auth from Windows clients.
# ============================================================

- name: Ensure PasswordAuthentication yes in sshd_config (main file)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    state: present
    validate: '/usr/sbin/sshd -t -f %s'
  notify: restart sshd
  tags: [jumphost, ssh]

- name: Disable PasswordAuthentication override from cloud-init drop-in (if present)
  ansible.builtin.lineinfile:
    path: /etc/ssh/sshd_config.d/50-cloud-init.conf
    regexp: '^#?PasswordAuthentication'
    line: 'PasswordAuthentication yes'
    state: present
    create: false
  notify: restart sshd
  failed_when: false
  tags: [jumphost, ssh]

# ============================================================
# Timezone — Europe/Bucharest
# common role excludes jumphost — set here directly
# ============================================================

- name: Set timezone to Europe/Bucharest
  community.general.timezone:
    name: Europe/Bucharest
  tags: [jumphost, timezone]

# ============================================================
# Firefox — pre-configured bookmarks via policy
# Firefox is pre-installed in the Packer image; only deploy policy here.
# ============================================================

# Deploy Firefox policy to all possible locations — the PPA build may read
# from any of these depending on packaging version:
#   /etc/firefox-esr/policies/  — Debian/Ubuntu ESR packaging
#   /etc/firefox/policies/      — generic Firefox path (some PPA builds use this)
#   /usr/lib/firefox-esr/distribution/ — built-in distribution dir (always checked)

- name: Create Firefox policy directories (all possible paths)
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: '0755'
  loop:
    - /etc/firefox-esr/policies
    - /etc/firefox/policies
    - /usr/lib/firefox-esr/distribution
  tags: [jumphost, firefox]

- name: Deploy Firefox bookmarks policy (all possible paths)
  ansible.builtin.template:
    src: firefox-policies.json.j2
    dest: "{{ item }}"
    owner: root
    group: root
    mode: '0644'
  loop:
    - /etc/firefox-esr/policies/policies.json
    - /etc/firefox/policies/policies.json
    - /usr/lib/firefox-esr/distribution/policies.json
  tags: [jumphost, firefox]

# ============================================================
# SMB client — cifs-utils/smbclient install, /mnt/smb/public mount point,
# and the credential-storage script + autostart entry are now baked into
# the ubuntu-jumphost Packer image (provision-jumphost.sh). Only the actual
# secret (from Ansible Vault) is written here at deploy time — it cannot be
# baked into a shared image.
# ============================================================

# ============================================================
# MySQL Workbench — pre-configured connection to vm-db-01
# ============================================================

- name: Create MySQL Workbench config directory
  file:
    path: "/home/{{ ansible_user }}/{{ item }}"
    state: directory
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0755'
  loop:
    - .mysql
    - .mysql/workbench
  tags: [jumphost, mysql-workbench]

# ============================================================
# GNOME Keyring — credentiale SMB pentru vm-fs-01
# secret-tool stocheaza azureadmin in keyring-ul de login.
# Keyring-ul se deblocheaza automat la login xRDP cu parola azureadmin.
# Scriptul ruleaza o singura data la primul login dupa deploy.
# ============================================================

- name: Store azureadmin SMB password in secured file
  ansible.builtin.copy:
    content: "{{ vault_admin_password }}"
    dest: "/home/{{ ansible_user }}/.smb-pass"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
  tags: [jumphost, smb, keyring]

- name: Remove stored flag so script re-runs at next login
  ansible.builtin.file:
    path: "/home/{{ ansible_user }}/.smb-creds-stored"
    state: absent
  tags: [jumphost, smb, keyring]

- name: Deploy MySQL Workbench connections.xml (db connection to vm-db-01)
  template:
    src: workbench-connections.xml.j2
    dest: "/home/{{ ansible_user }}/.mysql/workbench/connections.xml"
    owner: "{{ ansible_user }}"
    group: "{{ ansible_user }}"
    mode: '0600'
    force: no  # do not overwrite if the user already customized their connections
  tags: [jumphost, mysql-workbench]
