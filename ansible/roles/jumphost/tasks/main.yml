---
# ============================================================
# Ansible Role: jumphost
# Configures Ubuntu 22.04 jumphost with XFCE, xRDP, Ansible, DevOps tools
# Note: Initial bootstrap (packages, xRDP, XFCE) is done by Custom Script
#       Extension at VM creation. This role handles ongoing configuration,
#       patching, and idempotent management.
# ============================================================

# --- Package Management ---

- name: Update apt cache
  ansible.builtin.apt:
    update_cache: yes
    cache_valid_time: 3600
  tags: [jumphost, packages]

- name: Ensure essential packages are installed
  ansible.builtin.apt:
    name:
      - xfce4
      - xfce4-goodies
      - xrdp
      - firefox
      - ansible
      - python3-pip
      - python3-winrm
      - sshpass
      - git
      - vim
      - nano
      - wget
      - curl
      - htop
      - tmux
      - net-tools
      - dnsutils
      - tcpdump
      - nmap
      - telnet
      - jq
      - tree
      - remmina
      - remmina-plugin-rdp
      - remmina-plugin-vnc
    state: present
  tags: [jumphost, packages]

# --- xRDP Configuration ---

- name: Configure xRDP to use XFCE
  ansible.builtin.copy:
    dest: /etc/xrdp/startwm.sh
    content: |
      #!/bin/sh
      if [ -r /etc/default/locale ]; then
        . /etc/default/locale
        export LANG LANGUAGE
      fi
      exec startxfce4
    owner: root
    group: root
    mode: '0755'
  notify: restart xrdp
  tags: [jumphost, xrdp]

- name: Configure xRDP port
  ansible.builtin.lineinfile:
    path: /etc/xrdp/xrdp.ini
    regexp: '^port='
    line: 'port=3389'
    state: present
  notify: restart xrdp
  tags: [jumphost, xrdp]

- name: Ensure xRDP is enabled and running
  ansible.builtin.systemd:
    name: xrdp
    enabled: yes
    state: started
  tags: [jumphost, xrdp]

# --- Firewall Configuration ---

- name: Configure UFW - allow SSH (port 22)
  community.general.ufw:
    rule: allow
    port: '22'
    proto: tcp
  tags: [jumphost, firewall]

- name: Configure UFW - allow RDP (port 3389)
  community.general.ufw:
    rule: allow
    port: '3389'
    proto: tcp
  tags: [jumphost, firewall]

- name: Enable UFW
  community.general.ufw:
    state: enabled
    policy: deny
    direction: incoming
  tags: [jumphost, firewall]

# --- Ansible Control Node ---

- name: Ensure Azure CLI is installed
  ansible.builtin.shell: az --version
  register: az_check
  changed_when: false
  failed_when: false
  tags: [jumphost, azure-cli]

- name: Install Azure CLI if missing
  ansible.builtin.shell: curl -sL https://aka.ms/InstallAzureCLIDeb | bash
  args:
    creates: /usr/bin/az
  when: az_check.rc != 0
  tags: [jumphost, azure-cli]

# --- SSH Key Management ---

- name: Generate SSH key pair for admin user
  ansible.builtin.user:
    name: "{{ admin_username | default('azureadmin') }}"
    generate_ssh_key: yes
    ssh_key_bits: 4096
    ssh_key_file: ".ssh/id_rsa"
    ssh_key_comment: "ansible@{{ inventory_hostname }}"
  tags: [jumphost, ssh-key]

- name: Fetch SSH public key
  ansible.builtin.slurp:
    src: "/home/{{ admin_username | default('azureadmin') }}/.ssh/id_rsa.pub"
  register: jumphost_ssh_pubkey
  tags: [jumphost, ssh-key]

- name: Save SSH public key as fact
  ansible.builtin.set_fact:
    jumphost_public_key: "{{ jumphost_ssh_pubkey.content | b64decode }}"
  tags: [jumphost, ssh-key]

- name: Display SSH public key
  ansible.builtin.debug:
    msg: "Jumphost SSH public key: {{ jumphost_public_key }}"
  tags: [jumphost, ssh-key]

# --- Workspace ---

- name: Ensure Ansible workspace exists
  ansible.builtin.file:
    path: "/home/{{ admin_username | default('azureadmin') }}/ansible"
    state: directory
    owner: "{{ admin_username | default('azureadmin') }}"
    group: "{{ admin_username | default('azureadmin') }}"
    mode: '0755'
  tags: [jumphost, workspace]

# --- MOTD ---

- name: Create welcome message (MOTD)
  ansible.builtin.copy:
    dest: /etc/motd
    content: |
      ==========================================
      SC MEDIA SRL - DevOps Jumphost
      ==========================================

      Hostname: {{ ansible_hostname }}
      IP: {{ ansible_default_ipv4.address | default('N/A') }}
      OS: {{ ansible_distribution }} {{ ansible_distribution_version }}

      Tools installed:
      - Ansible (ansible --version)
      - Azure CLI (az --version)
      - Git, VS Code, Remmina
      - RDP port: 3389

      SSH to Linux VMs:
        ssh azureadmin@vm-web-01
        ssh azureadmin@vm-app-01
        ssh azureadmin@vm-cms-01

      RDP to Windows VMs:
        remmina (pre-configured profiles)

      Ansible workspace: ~/ansible
      ==========================================
    owner: root
    group: root
    mode: '0644'
  tags: [jumphost, motd]
