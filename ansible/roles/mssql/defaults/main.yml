# ============================================================
# Ansible Role: mssql - Default Variables
# IMPORTANT: Override sensitive values in Ansible Vault
# ============================================================

# SQL Server configuration
mssql_version: "2022"
mssql_edition: "Developer" # Options: Developer, Express, Standard, Enterprise
mssql_accept_eula: "Y"
mssql_sa_password: "ChangeMe_SA_P@ssw0rd_2026!"

# SQL Server service settings
mssql_tcp_port: 1433
mssql_enable_agent: yes
mssql_agent_enabled: yes

# WordPress database configuration
wordpress_db_name: wordpress_db
wordpress_db_user: wordpress_user
wordpress_db_password: "ChangeMe_WP_DB_P@ssw0rd!"

# Backup configuration
mssql_backup_enabled: yes
mssql_backup_dir: "C:\SQLBackups"
mssql_backup_retention_days: 7

# Firewall configuration
mssql_firewall_enabled: yes
