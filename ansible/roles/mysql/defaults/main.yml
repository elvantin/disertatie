# ============================================================
# Ansible Role: mysql - Default Variables
# MySQL Community Server 8.0 on Windows Server 2022
# IMPORTANT: Override passwords in group_vars or Ansible Vault
# ============================================================

# MySQL Installer MSI download (Community Edition, ~350MB)
mysql_download_url: "https://cdn.mysql.com//Downloads/MySQLInstaller/mysql-installer-community-8.0.45.0.msi"
mysql_version_label: "8.0.45"

# Installation paths (MSI default locations)
mysql_install_dir: "C:\\Program Files\\MySQL\\MySQL Server 8.0"
mysql_installer_dir: "C:\\Program Files (x86)\\MySQL\\MySQL Installer for Windows"
mysql_data_dir: "C:\\ProgramData\\MySQL\\MySQL Server 8.0\\Data"
mysql_log_dir: "C:\\ProgramData\\MySQL\\MySQL Server 8.0\\Logs"
mysql_backup_dir: "C:\\MySQL\\Backups"

# MySQL root password (PRODUCTION: Store in Ansible Vault!)
mysql_root_password: "Str0ng_MySQL_R00t_2026!"

# WordPress database
mysql_wordpress_db: "wordpress_db"
mysql_wordpress_user: "wp_user"
mysql_wordpress_password: "Wp_P@ssw0rd_2026!"

# Monitoring user
mysql_monitoring_password: "Mon_P@ssw0rd_2026!"

# Network settings
mysql_port: 3306
mysql_bind_address: "0.0.0.0"
mysql_max_connections: 200

# Business database (CRM data for API)
mysql_business_db: "mediasrl_business"
