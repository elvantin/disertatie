# ============================================================
# Ansible Role: mysql - Default Variables
# MySQL Community Server 8.0 on Windows Server 2022
# IMPORTANT: Override passwords in group_vars or Ansible Vault
# ============================================================

# MySQL Community Server 8.0 ZIP download (Windows x64)
mysql_download_url: "https://dev.mysql.com/get/Downloads/MySQL-8.0/mysql-8.0.40-winx64.zip"

# Installation paths
mysql_install_dir: "C:\\MySQL\\Server"
mysql_data_dir: "C:\\MySQL\\Data"
mysql_log_dir: "C:\\MySQL\\Logs"
mysql_backup_dir: "C:\\MySQL\\Backups"

# MySQL root password (PRODUCTION: Store in Ansible Vault!)
mysql_root_password: "Str0ng_MySQL_R00t_2026!"

# WordPress database
mysql_wordpress_db: "wordpress_db"
mysql_wordpress_user: "wp_user"
mysql_wordpress_password: "Wp_P@ssw0rd_2026!"

# Monitoring user
mysql_monitoring_password: "Mon_P@ssw0rd_2026!"

# Network settings
mysql_port: 3306
mysql_bind_address: "0.0.0.0"
mysql_max_connections: 200

# Backup settings
mysql_backup_retention_days: 7
