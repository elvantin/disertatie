---
# ============================================================
# Ansible Role: mysql
# Installs and configures MySQL Community Server 8.0 on Windows
# Target: vm-db-01 (Windows Server 2022)
# Uses MySQL Installer MSI for reliable silent installation
# ============================================================

- name: Create temporary directory
  ansible.windows.win_file:
    path: C:\Temp
    state: directory
  tags: [mysql, prereq]

- name: Create backup directory
  ansible.windows.win_file:
    path: "{{ mysql_backup_dir }}"
    state: directory
  tags: [mysql, prereq, directories]

- name: Check if MySQL is already installed
  ansible.windows.win_service:
    name: MySQL80
  register: mysql_service_check
  failed_when: false
  tags: [mysql, check]

- name: Display MySQL installation status
  debug:
    msg: "MySQL Server is {{ 'already installed' if mysql_service_check.exists | default(false) else 'not installed' }}"
  tags: [mysql, check]

# ============================================================
# Phase 1: Download MySQL Installer MSI (~350MB)
# ============================================================

- name: Check if MySQL MSI already downloaded
  ansible.windows.win_stat:
    path: "C:\\Temp\\mysql-installer.msi"
  register: mysql_msi_stat
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, download]

- name: Download MySQL Installer MSI (~350MB, please wait)
  ansible.windows.win_get_url:
    url: "{{ mysql_download_url }}"
    dest: 'C:\Temp\mysql-installer.msi'
    force: no
    timeout: 900
  when:
    - not (mysql_service_check.exists | default(false))
    - not (mysql_msi_stat.stat.exists | default(false))
  register: mysql_download
  tags: [mysql, download]

- name: Verify MSI file was downloaded
  ansible.windows.win_stat:
    path: "C:\\Temp\\mysql-installer.msi"
  register: mysql_msi_verify
  failed_when: not mysql_msi_verify.stat.exists
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, download]

# ============================================================
# Phase 2: Install MySQL Installer (meta-installer)
# ============================================================

- name: Check if MySQL Installer is already installed
  ansible.windows.win_stat:
    path: "{{ mysql_installer_dir }}\\MySQLInstallerConsole.exe"
  register: mysql_installer_check
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, install]

- name: Install MySQL Installer via MSI (silent)
  ansible.windows.win_shell: |
    $process = Start-Process -FilePath "msiexec.exe" -ArgumentList "/i", "C:\Temp\mysql-installer.msi", "/quiet", "/norestart", "ACCEPT=YES" -Wait -PassThru -NoNewWindow
    if ($process.ExitCode -eq 0) {
        Write-Output "MySQL Installer installed successfully"
    } else {
        Write-Output "MySQL Installer exit code: $($process.ExitCode)"
        exit $process.ExitCode
    }
  when:
    - not (mysql_service_check.exists | default(false))
    - not (mysql_installer_check.stat.exists | default(false))
  register: mysql_installer_install
  tags: [mysql, install]

- name: Wait for MySQL Installer to be ready
  ansible.windows.win_stat:
    path: "{{ mysql_installer_dir }}\\MySQLInstallerConsole.exe"
  register: installer_ready
  until: installer_ready.stat.exists
  retries: 10
  delay: 5
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, install]

# ============================================================
# Phase 3: Prerequisites + Install MySQL Server
# ============================================================

- name: Check if Visual C++ Redistributable is installed
  ansible.windows.win_shell: |
    $vcInstalled = Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\VisualStudio\14.0\VC\Runtimes\x64' -ErrorAction SilentlyContinue
    if ($vcInstalled) {
        Write-Output "VC++ Redistributable already installed (version $($vcInstalled.Version))"
    } else {
        Write-Output "NOT_INSTALLED"
    }
  register: vcredist_check
  changed_when: false
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, prereq]

- name: Download Visual C++ 2015-2022 Redistributable x64
  ansible.windows.win_get_url:
    url: 'https://aka.ms/vs/17/release/vc_redist.x64.exe'
    dest: 'C:\Temp\vc_redist.x64.exe'
    force: no
  when:
    - not (mysql_service_check.exists | default(false))
    - "'NOT_INSTALLED' in vcredist_check.stdout"
  tags: [mysql, prereq]

- name: Install Visual C++ 2015-2022 Redistributable x64
  ansible.windows.win_shell: |
    Start-Process -FilePath 'C:\Temp\vc_redist.x64.exe' -ArgumentList '/install', '/quiet', '/norestart' -Wait -NoNewWindow
    Write-Output 'Visual C++ Redistributable installed'
  when:
    - not (mysql_service_check.exists | default(false))
    - "'NOT_INSTALLED' in vcredist_check.stdout"
  tags: [mysql, prereq]

- name: Install MySQL Server from cached MSI
  ansible.windows.win_package:
    path: 'C:\ProgramData\MySQL\MySQL Installer for Windows\Product Cache\mysql-{{ mysql_version_label }}-winx64.msi'
    state: present
    arguments: '/quiet /norestart'
  when: not (mysql_service_check.exists | default(false))
  register: mysql_server_install
  tags: [mysql, install]

- name: Find mysqld.exe installation path
  ansible.windows.win_shell: |
    $found = Get-ChildItem -Path 'C:\Program Files\MySQL' -Filter 'mysqld.exe' -Recurse -ErrorAction SilentlyContinue
    if ($found) {
        Write-Output $found[0].Directory.Parent.FullName
    } else {
        Write-Output 'NOT_FOUND'
    }
  register: mysql_actual_path
  changed_when: false
  failed_when: false
  tags: [mysql, install]

- name: Debug - detected MySQL path
  debug:
    msg: "MySQL detected at: {{ mysql_actual_path.stdout | default('skipped') | trim }}"
  tags: [mysql, install]

- name: Set MySQL install dir fact from detected path
  set_fact:
    mysql_install_dir: "{{ mysql_actual_path.stdout | trim }}"
  when:
    - mysql_actual_path.stdout is defined
    - "'NOT_FOUND' not in mysql_actual_path.stdout"
  tags: [mysql, install]

# ============================================================
# Phase 4: Configure and start MySQL service
# ============================================================

- name: Create data directory
  ansible.windows.win_file:
    path: "{{ mysql_data_dir }}"
    state: directory
  tags: [mysql, config]

- name: Create logs directory
  ansible.windows.win_file:
    path: "{{ mysql_log_dir }}"
    state: directory
  tags: [mysql, config]

# Bootstrap my.ini intentionally omits skip-name-resolve so that mysql.exe can
# authenticate as root@'localhost' via TCP from 127.0.0.1 during initial user setup.
# After bootstrap users (root@'127.0.0.1', root@'10.10.%') are created, the final
# my.ini (with skip-name-resolve) is written and MySQL is restarted.
- name: Create MySQL bootstrap my.ini (skip-name-resolve disabled for initial user setup)
  ansible.windows.win_copy:
    content: |
      [mysqld]
      # Installation paths
      basedir={{ mysql_install_dir }}
      datadir={{ mysql_data_dir }}

      # Network
      port={{ mysql_port }}
      bind-address={{ mysql_bind_address }}

      # Connections
      max_connections={{ mysql_max_connections }}

      # Character set
      character-set-server=utf8mb4
      collation-server=utf8mb4_unicode_ci

      # InnoDB settings
      innodb_buffer_pool_size=256M
      innodb_log_file_size=64M
      innodb_flush_log_at_trx_commit=1

      # Logging
      log-error={{ mysql_log_dir }}/error.log
      slow_query_log=1
      slow_query_log_file={{ mysql_log_dir }}/slow-query.log
      long_query_time=2

      # Security
      local_infile=0
      enable-named-pipe

      [client]
      port={{ mysql_port }}
      default-character-set=utf8mb4
    dest: "{{ mysql_install_dir }}\\my.ini"
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, config]

- name: Check if MySQL data directory is initialized
  ansible.windows.win_stat:
    path: "{{ mysql_data_dir }}\\mysql"
  register: mysql_data_check
  tags: [mysql, config]

- name: Initialize MySQL data directory
  ansible.windows.win_shell: |
    & '{{ mysql_install_dir }}\bin\mysqld.exe' --defaults-file='{{ mysql_install_dir }}\my.ini' --initialize-insecure --console 2>&1
    Write-Output "Data directory initialized (exit code: $LASTEXITCODE)"
  when: not mysql_data_check.stat.exists
  register: mysql_init
  tags: [mysql, config]

- name: Check if MySQL80 service exists
  ansible.windows.win_service:
    name: MySQL80
  register: mysql_svc_exists
  failed_when: false
  tags: [mysql, service]

- name: Install MySQL as Windows service
  ansible.windows.win_shell: |
    & '{{ mysql_install_dir }}\bin\mysqld.exe' --install MySQL80 --defaults-file='{{ mysql_install_dir }}\my.ini' 2>&1
    Write-Output "Service installed (exit code: $LASTEXITCODE)"
  when: not (mysql_svc_exists.exists | default(false))
  tags: [mysql, service]

- name: Reboot before starting MySQL service (clean state after install)
  ansible.windows.win_reboot:
    reboot_timeout: 300
    post_reboot_delay: 30
  when: not (mysql_service_check.exists | default(false))
  tags: [mysql, service]

- name: Ensure MySQL service is running
  ansible.windows.win_service:
    name: MySQL80
    start_mode: auto
    state: started
  tags: [mysql, service]

# Firewall rule must be created BEFORE the wait loop so the TCP connection
# from the Ansible control node (jumphost) is not blocked during health checks.
- name: Configure Windows Firewall for MySQL
  community.windows.win_firewall_rule:
    name: "MySQL Server (TCP {{ mysql_port }})"
    localport: "{{ mysql_port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: yes
  tags: [mysql, firewall]

- name: Wait for MySQL port to accept TCP connections
  ansible.windows.win_shell: |
    # MySQL can take >60s on first boot after --initialize-insecure.
    # Test-NetConnection checks the TCP port without needing mysql.exe or passwords.
    Start-Sleep -Seconds 10
    $maxRetries = 60
    $retry = 0
    while ($retry -lt $maxRetries) {
        $tcpTest = Test-NetConnection -ComputerName 127.0.0.1 -Port {{ mysql_port }} `
            -InformationLevel Quiet -ErrorAction SilentlyContinue -WarningAction SilentlyContinue
        if ($tcpTest -eq $true) {
            Write-Output "MySQL port {{ mysql_port }} is accepting connections (attempt $retry)"
            exit 0
        }
        $retry++
        Start-Sleep -Seconds 2
    }
    Write-Output "Timeout: MySQL port {{ mysql_port }} not ready after $($maxRetries * 2)s"
    exit 1
  register: mysql_ready
  changed_when: false
  tags: [mysql, service]

- name: Dump MySQL error log when wait fails
  ansible.windows.win_shell: |
    $logFile = "{{ mysql_log_dir }}\error.log"
    if (Test-Path $logFile) {
        Write-Output "=== Last 40 lines of MySQL error log ==="
        Get-Content $logFile -Tail 40
    } else {
        Write-Output "Log file not found at: $logFile"
        Write-Output ""
        Write-Output "=== MySQL service status ==="
        Get-Service MySQL80 -ErrorAction SilentlyContinue | Select-Object Name, Status, StartType | Format-List
        Write-Output ""
        Write-Output "=== mysqld.exe presence ==="
        Test-Path "{{ mysql_install_dir }}\bin\mysqld.exe"
    }
  when: mysql_ready is failed
  failed_when: false
  changed_when: false
  tags: [mysql, service, debug]

# ============================================================
# Phase 5: Security configuration
# ============================================================

- name: Set MySQL root password
  ansible.windows.win_shell: |
    $mysqlExe = "{{ mysql_install_dir }}\bin\mysql.exe"
    # On fresh install: bootstrap my.ini has no skip-name-resolve, so root@'localhost'
    # matches TCP from 127.0.0.1. root has no password after --initialize-insecure.
    # On re-run: root@'127.0.0.1' already exists with password set.
    $testAuth = & $mysqlExe -u root -p"{{ mysql_root_password }}" -h 127.0.0.1 -P {{ mysql_port }} -e "SELECT 1" 2>&1
    if ($LASTEXITCODE -eq 0) {
        Write-Output "Root password already configured"
    } else {
        # Fresh install: root has no password — connect without -p and set it
        & $mysqlExe -u root -h 127.0.0.1 -P {{ mysql_port }} -e "ALTER USER 'root'@'localhost' IDENTIFIED BY '{{ mysql_root_password }}'; FLUSH PRIVILEGES;" 2>&1
        if ($LASTEXITCODE -eq 0) {
            Write-Output "Root password set"
        } else {
            Write-Output "Failed to set root password"
            exit 1
        }
    }
  register: mysql_root_set
  changed_when: "'Root password set' in mysql_root_set.stdout"
  no_log: true
  tags: [mysql, config, security]

# Create remote root users for management access.
# skip-name-resolve requires explicit IP entries (not hostnames).
# root@'127.0.0.1' — TCP loopback for Ansible tasks using -h 127.0.0.1.
# root@'10.10.%'   — MySQL Workbench from jumphost/any VNet VM.
# Uses named pipe (no -h) since root@'127.0.0.1' does not exist yet.
- name: Create root users for TCP loopback and VNet remote management
  ansible.windows.win_shell: >-
    & '{{ mysql_install_dir }}\bin\mysql.exe' -u root
    -p'{{ mysql_root_password }}'
    -h 127.0.0.1 -P {{ mysql_port }}
    -e "CREATE USER IF NOT EXISTS 'root'@'127.0.0.1'
    IDENTIFIED BY '{{ mysql_root_password }}';
    GRANT ALL PRIVILEGES ON *.* TO 'root'@'127.0.0.1' WITH GRANT OPTION;
    CREATE USER IF NOT EXISTS 'root'@'10.10.%'
    IDENTIFIED BY '{{ mysql_root_password }}';
    GRANT ALL PRIVILEGES ON *.* TO 'root'@'10.10.%' WITH GRANT OPTION;
    FLUSH PRIVILEGES;"
  register: root_remote_user
  changed_when: false
  no_log: true
  tags: [mysql, config, security]

# Write the final my.ini now that root@'127.0.0.1' and root@'10.10.%' exist.
# skip-name-resolve is safe to enable: all subsequent Ansible tasks use -h 127.0.0.1
# which matches root@'127.0.0.1', and MySQL Workbench connects as root@'10.10.%'.
- name: Write final MySQL my.ini with skip-name-resolve
  ansible.windows.win_copy:
    content: |
      [mysqld]
      # Installation paths
      basedir={{ mysql_install_dir }}
      datadir={{ mysql_data_dir }}

      # Network
      port={{ mysql_port }}
      bind-address={{ mysql_bind_address }}

      # Connections
      max_connections={{ mysql_max_connections }}

      # Character set
      character-set-server=utf8mb4
      collation-server=utf8mb4_unicode_ci

      # InnoDB settings
      innodb_buffer_pool_size=256M
      innodb_log_file_size=64M
      innodb_flush_log_at_trx_commit=1

      # Logging
      log-error={{ mysql_log_dir }}/error.log
      slow_query_log=1
      slow_query_log_file={{ mysql_log_dir }}/slow-query.log
      long_query_time=2

      # Security
      local_infile=0
      # Required for IP wildcard grants (root@'10.10.%') to work.
      # Without this MySQL resolves client IPs to FQDNs and IP-pattern grants never match.
      skip-name-resolve
      enable-named-pipe

      [client]
      port={{ mysql_port }}
      default-character-set=utf8mb4
    dest: "{{ mysql_install_dir }}\\my.ini"
  notify: restart mysql
  tags: [mysql, config]

- name: Apply my.ini changes (restart MySQL if skip-name-resolve was just added)
  meta: flush_handlers

# After flush_handlers restarts MySQL (win_service restarted returns before MySQL
# is fully accepting connections). Wait explicitly before Phase 6 tasks connect.
- name: Wait for MySQL to be ready after my.ini restart
  ansible.windows.win_shell: |
    $maxRetries = 30
    $retry = 0
    while ($retry -lt $maxRetries) {
        $tcpTest = Test-NetConnection -ComputerName 127.0.0.1 -Port {{ mysql_port }} `
            -InformationLevel Quiet -ErrorAction SilentlyContinue -WarningAction SilentlyContinue
        if ($tcpTest -eq $true) {
            Write-Output "MySQL ready after restart (attempt $retry)"
            exit 0
        }
        $retry++
        Start-Sleep -Seconds 3
    }
    Write-Output "MySQL not ready after restart"
    exit 1
  register: mysql_ready_after_restart
  changed_when: false
  tags: [mysql, service]

# ============================================================
# Phase 6: Create databases and users
# ============================================================

- name: Create WordPress database
  ansible.windows.win_shell: |
    & "{{ mysql_install_dir }}\bin\mysql.exe" -u root -p"{{ mysql_root_password }}" -h 127.0.0.1 -P {{ mysql_port }} -e "CREATE DATABASE IF NOT EXISTS {{ mysql_wordpress_db }} CHARACTER SET utf8mb4 COLLATE utf8mb4_unicode_ci;"
    if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }
    Write-Output "Database {{ mysql_wordpress_db }} ensured"
  register: create_db
  changed_when: false
  no_log: true
  tags: [mysql, database]

- name: Create WordPress database user
  ansible.windows.win_shell: >-
    & '{{ mysql_install_dir }}\bin\mysql.exe' -u root
    -p'{{ mysql_root_password }}'
    -h 127.0.0.1 -P {{ mysql_port }}
    -e "CREATE USER IF NOT EXISTS '{{ mysql_wordpress_user }}'@'%'
    IDENTIFIED BY '{{ mysql_wordpress_password }}';
    GRANT ALL PRIVILEGES ON {{ mysql_wordpress_db }}.* TO '{{ mysql_wordpress_user }}'@'%';
    FLUSH PRIVILEGES;"
  register: create_user
  changed_when: false
  no_log: true
  tags: [mysql, database, user]

- name: Create monitoring user
  ansible.windows.win_shell: >-
    & '{{ mysql_install_dir }}\bin\mysql.exe' -u root
    -p'{{ mysql_root_password }}'
    -h 127.0.0.1 -P {{ mysql_port }}
    -e "CREATE USER IF NOT EXISTS 'monitoring'@'localhost'
    IDENTIFIED BY '{{ mysql_monitoring_password }}';
    GRANT SELECT, PROCESS, REPLICATION CLIENT ON *.* TO 'monitoring'@'localhost';
    FLUSH PRIVILEGES;"
  register: create_monitor
  changed_when: false
  no_log: true
  tags: [mysql, database, monitoring]

# ============================================================
# Phase 8: Business database (CRM data for API)
# ============================================================

- name: Copy business seed data SQL file
  ansible.windows.win_copy:
    src: seed-business-data.sql
    dest: C:\Temp\seed-business-data.sql
  tags: [mysql, business, seed]

- name: Check if business database exists
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Continue'
    & "{{ mysql_install_dir }}\bin\mysql.exe" -u root -p"{{ mysql_root_password }}" `
      -h 127.0.0.1 -P {{ mysql_port }} `
      -e "SELECT SCHEMA_NAME FROM INFORMATION_SCHEMA.SCHEMATA WHERE SCHEMA_NAME='{{ mysql_business_db }}';" 2>&1
  register: business_db_check
  changed_when: false
  failed_when: false
  no_log: true
  tags: [mysql, business, seed]

- name: Import business seed data
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'Continue'
    $sql = Get-Content -Path 'C:\Temp\seed-business-data.sql' -Raw -Encoding UTF8
    $sql | & "{{ mysql_install_dir }}\bin\mysql.exe" -u root -p"{{ mysql_root_password }}" `
      -h 127.0.0.1 -P {{ mysql_port }} --default-character-set=utf8mb4 2>&1
    exit $LASTEXITCODE
  when: "'mediasrl_business' not in business_db_check.stdout"
  no_log: true
  tags: [mysql, business, seed]

- name: Create API database user
  ansible.windows.win_shell: >-
    & '{{ mysql_install_dir }}\bin\mysql.exe' -u root
    -p'{{ mysql_root_password }}'
    -h 127.0.0.1 -P {{ mysql_port }}
    -e "CREATE USER IF NOT EXISTS '{{ mysql_api_user }}'@'%'
    IDENTIFIED BY '{{ mysql_api_password }}';
    GRANT SELECT ON {{ mysql_business_db }}.* TO '{{ mysql_api_user }}'@'%';
    FLUSH PRIVILEGES;"
  changed_when: false
  no_log: true
  tags: [mysql, business, user]

- name: Cleanup seed SQL file
  ansible.windows.win_file:
    path: C:\Temp\seed-business-data.sql
    state: absent
  tags: [mysql, business, cleanup]

# ============================================================
# Phase 9: Verification
# ============================================================

- name: Verify MySQL installation
  ansible.windows.win_shell: |
    $ErrorActionPreference = 'SilentlyContinue'
    & '{{ mysql_install_dir }}\bin\mysql.exe' -u root -p'{{ mysql_root_password }}' -h 127.0.0.1 -P {{ mysql_port }} -e 'SELECT VERSION() AS version; SHOW DATABASES;' 2>$null
  register: mysql_version
  changed_when: false
  failed_when: "'version' not in mysql_version.stdout"
  tags: [mysql, verify]

- name: Display MySQL configuration status
  debug:
    msg: |
      ============================================================
      MySQL Server Configuration Completed
      ============================================================
      Server: {{ inventory_hostname }}
      MySQL Version: {{ mysql_version_label }}
      Port: {{ mysql_port }}
      Bind Address: {{ mysql_bind_address }}
      Install Dir: {{ mysql_install_dir }}
      Data Dir: {{ mysql_data_dir }}

      WordPress Database:
        Database: {{ mysql_wordpress_db }}
        User: {{ mysql_wordpress_user }}
        Host: {{ mysql_bind_address }}:{{ mysql_port }}

      Business Database (API):
        Database: {{ mysql_business_db }}
        User: {{ mysql_api_user }}
        Tables: angajati, servicii, clienti, proiecte, facturi

      Connection from vm-cms-01:
        mysql -h {{ mysql_bind_address }} -P {{ mysql_port }} -u {{ mysql_wordpress_user }} -p

      ============================================================
  tags: [mysql, verify]

# ============================================================
# Phase 10: Cleanup
# ============================================================

- name: Cleanup installation files
  ansible.windows.win_file:
    path: "C:\\Temp\\mysql-installer.msi"
    state: absent
  when: mysql_server_install.changed | default(false)
  tags: [mysql, cleanup]
