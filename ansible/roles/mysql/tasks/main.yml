# ============================================================
# Ansible Role: mysql
# Installs and configures MySQL on Windows Server (vm-db-01)
# ============================================================

- name: Download MySQL Installer
  ansible.windows.win_get_url:
    url: https://dev.mysql.com/get/Downloads/MySQLInstaller/mysql-installer-community-8.0.40.0.msi
    dest: C:\Temp\mysql-installer.msi
  tags: [mysql, download]

- name: Install MySQL Server
  ansible.windows.win_package:
    path: C:\Temp\mysql-installer.msi
    arguments: '/quiet /norestart ADD FEATURES=Server,Client ADD INSTALLDIR="C:\Program Files\MySQL\MySQL Server 8.0"'
    state: present
    product_id: '{4D59C5C9-8D21-4B8E-9A37-C6C8F7F4EA39}'
  tags: [mysql, install]

- name: Create MySQL data directory
  ansible.windows.win_file:
    path: C:\MySQL\Data
    state: directory
  tags: [mysql, directories]

- name: Create MySQL backup directory
  ansible.windows.win_file:
    path: C:\MySQL\Backups
    state: directory
  tags: [mysql, directories]

- name: Configure MySQL (my.ini)
  ansible.windows.win_template:
    src: my.ini.j2
    dest: 'C:\Program Files\MySQL\MySQL Server 8.0\my.ini'
  notify: restart mysql
  tags: [mysql, config]

- name: Configure Windows Firewall for MySQL
  community.windows.win_firewall_rule:
    name: MySQL Server
    localport: 3306
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: yes
  tags: [mysql, firewall]

- name: Ensure MySQL service is running
  ansible.windows.win_service:
    name: MySQL80
    start_mode: auto
    state: started
  tags: [mysql, service]

- name: Create database for WordPress
  community.mysql.mysql_db:
    name: wordpress_db
    state: present
    login_host: localhost
    login_user: root
    login_password: "{{ mysql_root_password }}"
  tags: [mysql, database]

- name: Create MySQL user for WordPress
  community.mysql.mysql_user:
    name: wordpress_user
    password: "{{ mysql_wordpress_password }}"
    priv: 'wordpress_db.*:ALL'
    host: '10.10.10.%'
    state: present
    login_host: localhost
    login_user: root
    login_password: "{{ mysql_root_password }}"
  tags: [mysql, user]

- name: Create MySQL user for monitoring
  community.mysql.mysql_user:
    name: monitoring
    password: "{{ mysql_monitoring_password }}"
    priv: '*.*:SELECT,PROCESS,REPLICATION CLIENT'
    host: 'localhost'
    state: present
    login_host: localhost
    login_user: root
    login_password: "{{ mysql_root_password }}"
  tags: [mysql, user, monitoring]

- name: Configure automated backup script
  ansible.windows.win_template:
    src: backup-mysql.ps1.j2
    dest: C:\MySQL\Backups\backup-mysql.ps1
  tags: [mysql, backup]

- name: Schedule daily MySQL backup
  community.windows.win_scheduled_task:
    name: MySQL Daily Backup
    description: Automated daily backup of MySQL databases
    actions:
      - path: powershell.exe
        arguments: '-ExecutionPolicy Bypass -File "C:\MySQL\Backups\backup-mysql.ps1"'
    triggers:
      - type: daily
        start_boundary: '2026-01-01T02:00:00'
    username: SYSTEM
    state: present
    enabled: yes
  tags: [mysql, backup, schedule]
