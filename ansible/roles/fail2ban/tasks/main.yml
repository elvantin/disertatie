---
# ============================================================
# Ansible Role: fail2ban
# Auto-bans IPs after repeated failed SSH/nginx attempts
# ============================================================

- name: Install fail2ban
  ansible.builtin.apt:
    name:
      - fail2ban
      - python3-systemd   # required for systemd backend
    state: present
    update_cache: true
  tags: [fail2ban]

- name: Ensure fail2ban config directory exists
  ansible.builtin.file:
    path: /etc/fail2ban/jail.d
    state: directory
    owner: root
    group: root
    mode: '0755'
  tags: [fail2ban]

- name: Deploy jail.local configuration
  ansible.builtin.template:
    src: jail.local.j2
    dest: /etc/fail2ban/jail.local
    owner: root
    group: root
    mode: '0644'
    backup: true
  notify: restart fail2ban
  tags: [fail2ban]

# nginx-req-limit filter: detects IPs that trigger rate limiting (HTTP 429)
- name: Deploy nginx-req-limit filter
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/nginx-req-limit.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Fail2ban filter: ban IPs that hit nginx rate limits (429)
      [Definition]
      failregex = ^<HOST> -.*"(GET|POST|PUT|DELETE|HEAD).*" 429
      ignoreregex =
  notify: restart fail2ban
  tags: [fail2ban]

# nginx-botsearch filter: detects vulnerability scanners
- name: Deploy nginx-botsearch filter
  ansible.builtin.copy:
    dest: /etc/fail2ban/filter.d/nginx-botsearch.conf
    owner: root
    group: root
    mode: '0644'
    content: |
      # Fail2ban filter: ban bots scanning for common vulnerabilities
      [Definition]
      failregex = ^<HOST> -.*"(GET|POST|HEAD).*(\.php|\.asp|\.aspx|\.jsp|\.cgi|\.env|\.git|\.sql|wp-config|xmlrpc|admin|shell|eval|base64).*" (404|403|400)
      ignoreregex = .*(\.well-known|favicon\.ico|robots\.txt)
  notify: restart fail2ban
  tags: [fail2ban]

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    state: started
    enabled: true
  tags: [fail2ban]

- name: Wait for fail2ban to initialize
  ansible.builtin.pause:
    seconds: 3
  tags: [fail2ban]

- name: Verify fail2ban is running
  ansible.builtin.command: fail2ban-client status
  register: f2b_status
  changed_when: false
  failed_when: f2b_status.rc != 0
  tags: [fail2ban]

- name: Show fail2ban status
  ansible.builtin.debug:
    msg: "{{ f2b_status.stdout_lines }}"
  tags: [fail2ban]
