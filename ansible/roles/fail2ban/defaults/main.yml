---
# ============================================================
# Ansible Role: fail2ban — Default Variables
# ============================================================

# Global defaults
fail2ban_bantime: 3600          # Ban duration in seconds (1 hour)
fail2ban_findtime: 600          # Window for counting failures (10 minutes)
fail2ban_maxretry: 5            # Failures before ban
fail2ban_backend: systemd       # Log backend (systemd for Ubuntu 22.04)
# Jumphost/management subnet must be whitelisted so Ansible never loses connectivity
fail2ban_ignoreip: "127.0.0.1/8 ::1 10.10.12.0/24"
fail2ban_destemail: "admin@{{ website_domain | default('mediasrl.swedencentral.cloudapp.azure.com') }}"
fail2ban_sender: "fail2ban@{{ website_domain | default('mediasrl.swedencentral.cloudapp.azure.com') }}"

# SSH jail
fail2ban_ssh_enabled: true
fail2ban_ssh_port: ssh
fail2ban_ssh_maxretry: 5
fail2ban_ssh_bantime: 3600

# nginx jails
fail2ban_nginx_http_auth_enabled: true
fail2ban_nginx_req_limit_enabled: true
fail2ban_nginx_botsearch_enabled: true
fail2ban_nginx_maxretry: 5
fail2ban_nginx_bantime: 3600

# Log paths
fail2ban_nginx_access_log: /var/log/nginx/access.log
fail2ban_nginx_error_log: /var/log/nginx/error.log
