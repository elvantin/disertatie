---
# ============================================================
# Ansible Role: monitoring — Default Variables
# Override per-VM in host_vars/<vmname>/monitoring.yml
# ============================================================

# ---- Resource thresholds ----
monitoring_cpu_threshold: 90          # Alert when CPU usage >= X%
monitoring_disk_threshold: 90         # Alert when disk usage >= X%
monitoring_mem_threshold: 90          # Alert when memory usage >= X%

# ---- Linux script deployment ----
monitoring_cron_interval: 1           # Cron interval (minutes)
monitoring_script_path: /usr/local/bin/check-health.sh
monitoring_syslog_tag: mediasrl-health   # Must match KQL ProcessName in ama.bicep

# ---- Windows script deployment ----
monitoring_task_name: MediaSRL-HealthCheck
monitoring_ps_script_path: C:\Scripts\check-health.ps1
monitoring_event_source: mediasrl-health  # Application Event Log source, must match KQL

# ---- Per-VM service lists (override in host_vars/<vm>/monitoring.yml) ----
monitoring_linux_services: []         # systemd service names: [nginx, php8.1-fpm, sshd]
monitoring_windows_services: []       # Windows service names: [MySQL80, LanmanServer]

# ---- Per-VM port checks (override in host_vars/<vm>/monitoring.yml) ----
# Format: - { port: 443, description: "HTTPS nginx" }
monitoring_ports: []

# ---- Application-level checks (opt-in per VM) ----
monitoring_mysql_check: false         # vm-db-01: connects to MySQL and runs mysqladmin ping
monitoring_smb_check: false           # vm-fs-01: verifies SMB shares via Get-SmbShare
