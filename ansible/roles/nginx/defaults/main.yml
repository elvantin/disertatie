---
# ============================================================
# Ansible Role: nginx - Default Variables
# Web server configuration for SC MEDIA SRL
# ============================================================

# Nginx user (Ubuntu uses www-data, RedHat uses nginx)
nginx_user: "{{ 'www-data' if ansible_os_family == 'Debian' else 'nginx' }}"
nginx_group: "{{ 'www-data' if ansible_os_family == 'Debian' else 'nginx' }}"

# Website configuration
website_name: "mediasrl"
# Domain: use Azure DNS label FQDN (or replace with custom domain when available)
website_domain: "mediasrl.swedencentral.cloudapp.azure.com"
website_root: "/var/www/{{ website_name }}"
website_document_root: "{{ website_root }}/html"
website_logs_dir: "{{ website_root }}/logs"

# Nginx ports
nginx_http_port: 80
nginx_https_port: 443

# Nginx worker processes (auto = number of CPU cores)
nginx_worker_processes: "auto"
nginx_worker_connections: 1024

# Nginx performance settings
nginx_keepalive_timeout: 65
nginx_client_max_body_size: "64m"
nginx_server_tokens: "off"

# Enable/disable features
nginx_enable_gzip: true
nginx_enable_ssl: true
nginx_enable_http2: true

# Let's Encrypt / Certbot configuration
certbot_email: "admin@{{ website_domain }}"
certbot_webroot: "/var/www/letsencrypt"
certbot_cert_path: "/etc/letsencrypt/live/{{ website_domain }}/fullchain.pem"
certbot_key_path: "/etc/letsencrypt/live/{{ website_domain }}/privkey.pem"

# SSL/TLS configuration
nginx_ssl_certificate: "{{ certbot_cert_path }}"
nginx_ssl_certificate_key: "{{ certbot_key_path }}"

# ── Demo baseline — intentionally weak for BEFORE/AFTER demonstration ──────────
# SSL Labs Grade B (capped): TLSv1.1 prezent + ciphers SHA-1 HMAC + fara HSTS
# Playbook 4-harden-nginx-ssl.yml ridica la Grade A+:
#   - Elimina TLSv1.1, pastreaza doar TLSv1.2+1.3
#   - Inlocuieste SHA-1 HMAC cu AES-GCM
#   - Adauga DH params, OCSP stapling, HSTS, CSP, Permissions-Policy
# Nota: OpenSSL MinProtocol si SECLEVEL sunt coborati de tasks/main.yml
# si restaurati de playbook 4 (Phase 0). Fara aceasta, Ubuntu 22.04
# ignora silentios TLSv1.1 (MinProtocol=TLSv1.2 by default in openssl.cnf).
nginx_ssl_protocols: "TLSv1.1 TLSv1.2 TLSv1.3"
nginx_ssl_ciphers: "ECDHE-RSA-AES256-SHA384:ECDHE-RSA-AES256-SHA:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES128-SHA"

# OCSP Stapling — requires a valid Let's Encrypt cert with full chain.
# Set to false for self-signed certs (dev) to suppress nginx [warn] on startup.
nginx_ssl_stapling_enabled: false

# HSTS (HTTP Strict Transport Security)
# 0 = dezactivat in baseline (fara HSTS = SSL Labs nu poate da A+).
# Playbook 4 adauga HSTS max-age=31536000 includeSubDomains via security-headers.conf.
nginx_hsts_max_age: 0

# Security headers
nginx_security_headers:
  - "X-Frame-Options \"SAMEORIGIN\" always"
  - "X-Content-Type-Options \"nosniff\" always"
  - "X-XSS-Protection \"1; mode=block\" always"
  - "Referrer-Policy \"no-referrer-when-downgrade\" always"

# ── Rate Limiting ──────────────────────────────────────────────────────────────
# Disabled by default. Enabled by 5-harden-security.yml (--tags rate_limiting)
nginx_rate_limiting_enabled: false

# ── ModSecurity WAF ────────────────────────────────────────────────────────────
# Disabled by default. Set to true by modsecurity role after module is compiled.
nginx_modsecurity_enabled: false
nginx_modsecurity_conf: /etc/nginx/modsecurity/main.conf

# Company information
company_name: "SC MEDIA SRL"
company_description: "Marketing & PR Agency"
company_admin_email: "admin@{{ website_domain }}"
