- name: Display file server information
  ansible.builtin.debug:
    msg: |
      File Server configured successfully!
      Access shares: \\{{ ansible_hostname }}\ShareName

      Available shares:
      - \\{{ ansible_hostname }}\Public
      - \\{{ ansible_hostname }}\Marketing
      - \\{{ ansible_hostname }}\IT
      - \\{{ ansible_hostname }}\Backups
  tags: [fileserver, info]
