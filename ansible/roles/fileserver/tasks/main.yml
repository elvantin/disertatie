# ============================================================
# Ansible Role: fileserver
# Configures Windows Server as File Server with SMB shares
# ============================================================

# ============================================================
# Phase 0: Windows Storage Spaces — initialize data disk (LUN 0)
# Creates a Storage Pool + VirtualDisk + D:\ volume from the
# 32 GB data disk attached via Bicep. Idempotent: skipped if
# D:\ already exists.
# ============================================================

- name: Copy storage pool initialization script to target
  ansible.windows.win_copy:
    src: init-storage-pool.ps1
    dest: 'C:\Windows\Temp\init-storage-pool.ps1'
  tags: [fileserver, storage]

- name: Initialize data disk and create Storage Pool (D drive)
  ansible.windows.win_shell: powershell.exe -ExecutionPolicy Bypass -File C:\Windows\Temp\init-storage-pool.ps1
  register: storage_pool_result
  changed_when: "'already exists' not in storage_pool_result.stdout"
  tags: [fileserver, storage]

- name: Wait for D:\ to become available
  ansible.windows.win_wait_for:
    path: "D:\\"
    timeout: 60
  tags: [fileserver, storage]

- name: Install File Server role
  ansible.windows.win_feature:
    name: FS-FileServer
    state: present
    include_management_tools: yes
  tags: [fileserver, role]

- name: Create shared folders directory structure
  ansible.windows.win_file:
    path: "{{ item }}"
    state: directory
  loop:
    - D:\Shares
    - D:\Shares\Public
    - D:\Shares\Marketing
    - D:\Shares\IT
    - D:\Shares\Backups
  tags: [fileserver, directories]

- name: Create SMB share - Public
  ansible.windows.win_share:
    name: Public
    path: D:\Shares\Public
    description: "Public shared folder"
    full: "Everyone"
    state: present
  tags: [fileserver, shares]

- name: Create SMB share - Marketing
  ansible.windows.win_share:
    name: Marketing
    path: D:\Shares\Marketing
    description: "Marketing department files"
    full: "Administrators"
    change: "Users"
    state: present
  tags: [fileserver, shares]

- name: Create SMB share - IT
  ansible.windows.win_share:
    name: IT
    path: D:\Shares\IT
    description: "IT department files"
    full: "Administrators"
    state: present
  tags: [fileserver, shares]

- name: Create SMB share - Backups
  ansible.windows.win_share:
    name: Backups
    path: D:\Shares\Backups
    description: "Centralized backup storage"
    full: "Administrators"
    state: present
  tags: [fileserver, shares]

- name: Configure Windows Firewall for SMB
  community.windows.win_firewall_rule:
    name: "{{ item.name }}"
    localport: "{{ item.port }}"
    action: allow
    direction: in
    protocol: tcp
    state: present
    enabled: yes
  loop:
    - { name: 'SMB over TCP', port: '445' }
    - { name: 'NetBIOS Session Service', port: '139' }
  tags: [fileserver, firewall]

- name: Enable SMBv2 and SMBv3 (disable SMBv1)
  ansible.windows.win_shell: |
    Set-SmbServerConfiguration -EnableSMB1Protocol $false -Force
    Set-SmbServerConfiguration -EnableSMB2Protocol $true -Force
  tags: [fileserver, smb, security]

- name: Configure SMB signing (security)
  ansible.windows.win_shell: |
    Set-SmbServerConfiguration -RequireSecuritySignature $true -Force
  tags: [fileserver, smb, security]

