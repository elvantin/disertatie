# ============================================================
# Configure audit logging (Linux only)
# ============================================================

- name: Ensure auditd is installed
  ansible.builtin.dnf:
    name: audit
    state: present
  when: ansible_os_family == 'RedHat'
  tags: [hardening, audit]

- name: Configure audit rules
  ansible.builtin.copy:
    dest: /etc/audit/rules.d/cis.rules
    content: |
      # CIS Benchmark audit rules

      # Monitor user/group changes
      -w /etc/group -p wa -k identity
      -w /etc/passwd -p wa -k identity
      -w /etc/gshadow -p wa -k identity
      -w /etc/shadow -p wa -k identity

      # Monitor network environment
      -w /etc/hosts -p wa -k network
      -w /etc/sysconfig/network -p wa -k network

      # Monitor system authentication
      -w /var/log/lastlog -p wa -k logins
      -w /var/run/faillock/ -p wa -k logins

      # Monitor privileged commands
      -a always,exit -F arch=b64 -S execve -F euid=0 -k root_commands

      # Monitor file deletion
      -a always,exit -F arch=b64 -S unlink,unlinkat,rename,renameat -F auid>=1000 -F auid!=-1 -k delete
    owner: root
    group: root
    mode: '0640'
  when: ansible_os_family == 'RedHat'
  notify: restart auditd
  tags: [hardening, audit]

- name: Enable and start auditd service
  ansible.builtin.systemd:
    name: auditd
    enabled: yes
    state: started
  when: ansible_os_family == 'RedHat'
  tags: [hardening, audit]
