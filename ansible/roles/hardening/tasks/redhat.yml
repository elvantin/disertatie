# ============================================================
# CIS Hardening for RedHat-based systems (Rocky Linux)
# ============================================================

- name: Set password quality requirements
  ansible.builtin.lineinfile:
    path: /etc/security/pwquality.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^minlen', line: 'minlen = 14' }
    - { regexp: '^dcredit', line: 'dcredit = -1' }
    - { regexp: '^ucredit', line: 'ucredit = -1' }
    - { regexp: '^ocredit', line: 'ocredit = -1' }
    - { regexp: '^lcredit', line: 'lcredit = -1' }
  tags: [hardening, password]

- name: Configure password aging in login.defs
  ansible.builtin.lineinfile:
    path: /etc/login.defs
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^PASS_MAX_DAYS', line: 'PASS_MAX_DAYS   90' }
    - { regexp: '^PASS_MIN_DAYS', line: 'PASS_MIN_DAYS   1' }
    - { regexp: '^PASS_WARN_AGE', line: 'PASS_WARN_AGE   7' }
  tags: [hardening, password]

- name: Set account lockout policy
  ansible.builtin.lineinfile:
    path: /etc/security/faillock.conf
    regexp: "{{ item.regexp }}"
    line: "{{ item.line }}"
    state: present
  loop:
    - { regexp: '^deny', line: 'deny = 10' }
    - { regexp: '^unlock_time', line: 'unlock_time = 900' }
    - { regexp: '^fail_interval', line: 'fail_interval = 900' }
  tags: [hardening, lockout]

- name: Restrict core dumps
  ansible.builtin.lineinfile:
    path: /etc/security/limits.conf
    line: '*     hard   core    0'
    state: present
  tags: [hardening, coredump]

- name: Disable core dumps via sysctl
  ansible.posix.sysctl:
    name: fs.suid_dumpable
    value: '0'
    state: present
    reload: yes
  tags: [hardening, coredump]

- name: Set correct permissions on critical files
  ansible.builtin.file:
    path: "{{ item.path }}"
    mode: "{{ item.mode }}"
    owner: root
    group: root
  loop:
    - { path: '/etc/passwd', mode: '0644' }
    - { path: '/etc/shadow', mode: '0000' }
    - { path: '/etc/group', mode: '0644' }
    - { path: '/etc/gshadow', mode: '0000' }
    - { path: '/boot/grub2/grub.cfg', mode: '0600' }
  tags: [hardening, permissions]

- name: Ensure AIDE is installed for file integrity
  ansible.builtin.dnf:
    name: aide
    state: present
  tags: [hardening, aide]

- name: Initialize AIDE database (if not exists)
  ansible.builtin.command: aide --init
  args:
    creates: /var/lib/aide/aide.db.new.gz
  tags: [hardening, aide]

- name: Install and configure auditd
  ansible.builtin.dnf:
    name: audit
    state: present
  tags: [hardening, audit]
