# ============================================================
# Disable unnecessary services
# ============================================================

- name: Disable unnecessary Linux services
  ansible.builtin.systemd:
    name: "{{ item }}"
    enabled: no
    state: stopped
  loop:
    - rpcbind
    - nfs-server
  failed_when: false
  when: ansible_os_family != 'Windows'
  tags: [hardening, services]
