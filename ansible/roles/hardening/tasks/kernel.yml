# ============================================================
# Kernel hardening parameters (Linux only)
# ============================================================

- name: Deploy CIS kernel security parameters (sysctl)
  ansible.builtin.template:
    src: 99-cis-kernel-hardening.conf.j2
    dest: /etc/sysctl.d/99-cis-kernel-hardening.conf
    owner: root
    group: root
    mode: '0644'
  register: cis_sysctl_file
  when: ansible_os_family != 'Windows'
  tags: [hardening, kernel, sysctl]

- name: Apply CIS kernel security parameters
  ansible.builtin.command: sysctl -p /etc/sysctl.d/99-cis-kernel-hardening.conf
  when: ansible_os_family != 'Windows' and cis_sysctl_file.changed
  changed_when: true
  tags: [hardening, kernel, sysctl]
