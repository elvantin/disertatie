---
# ============================================================
# Ansible Role: appserver
# Installs nginx on vm-app-01 as backend API server (port 8080)
# Proxied by vm-web-01 reverse proxy at /api/
# ============================================================

- name: Install nginx
  ansible.builtin.apt:
    name: nginx
    state: present
    update_cache: yes
  tags: [appserver, install]

- name: Create application root directory
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: www-data
    group: www-data
    mode: '0755'
  loop:
    - "{{ app_root }}"
    - "{{ app_root }}/api"
  tags: [appserver, config]

- name: Deploy API JSON files
  ansible.builtin.copy:
    src: "api/{{ item }}"
    dest: "{{ app_root }}/api/{{ item }}"
    owner: www-data
    group: www-data
    mode: '0644'
  loop:
    - index.json
    - services.json
    - clients.json
    - projects.json
    - team.json
    - stats.json
  tags: [appserver, config, api]

- name: Remove default nginx site
  ansible.builtin.file:
    path: /etc/nginx/sites-enabled/default
    state: absent
  notify: reload nginx
  tags: [appserver, config]

- name: Deploy nginx virtual host configuration
  ansible.builtin.template:
    src: app-nginx.conf.j2
    dest: /etc/nginx/sites-available/app.conf
    owner: root
    group: root
    mode: '0644'
  notify: reload nginx
  tags: [appserver, config]

- name: Enable nginx virtual host
  ansible.builtin.file:
    src: /etc/nginx/sites-available/app.conf
    dest: /etc/nginx/sites-enabled/app.conf
    state: link
  notify: reload nginx
  tags: [appserver, config]

- name: Ensure nginx is enabled and started
  ansible.builtin.systemd:
    name: nginx
    enabled: yes
    state: started
  tags: [appserver, service]

- name: Test nginx configuration syntax
  ansible.builtin.command: nginx -t
  changed_when: false
  tags: [appserver, service]

- name: Reload nginx to apply current configuration
  ansible.builtin.systemd:
    name: nginx
    state: reloaded
  tags: [appserver, service]

- name: Allow port {{ app_listen_port }} through firewall
  ansible.builtin.ufw:
    rule: allow
    port: "{{ app_listen_port }}"
    proto: tcp
  when: ansible_facts.services['ufw.service'] is defined
  ignore_errors: yes
  tags: [appserver, firewall]

- name: Verify nginx is listening on port {{ app_listen_port }}
  ansible.builtin.wait_for:
    port: "{{ app_listen_port }}"
    host: 0.0.0.0
    timeout: 10
  tags: [appserver, verify]
