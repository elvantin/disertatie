# ============================================================
# Dynamic Azure Inventory Plugin — Development Environment
# Discovers VMs only from rg-mediasrl-dezvoltare-swedencentral
# Usage: ansible-playbook playbooks/site.yml -i inventory/azure_rm_dev.yml
# ============================================================

plugin: azure_rm

# Azure authentication — System-Assigned MSI on vm-jmp-01 (assigned via Bicep, Reader on RG).
auth_source: msi

# Filter VMs by resource group — DEZVOLTARE only
# For PROD environment use: ansible-playbook ... -i inventory/azure_rm.yml
include_vm_resource_groups:
  - rg-mediasrl-dezvoltare-swedencentral

# Only running VMs
exclude_host_filters:
  - powerstate != 'running'

# Use VM name as hostname (no conflict since dev and prod use separate inventory files)
plain_host_names: true

# Conditional groups based on VM name patterns
conditional_groups:
  windows: "'db' in name or 'fs' in name"
  linux: "'jmp' in name or 'web' in name or 'app' in name or 'cms' in name"
  jumphost: "'jmp' in name"
  database: "'db' in name"
  fileserver: "'fs' in name"
  webserver: "'web' in name"
  appserver: "'app' in name"
  cmsserver: "'cms' in name"

# Keyed groups
keyed_groups:
  - prefix: tag
    key: tags
    separator: "_"

# Compose variables
compose:
  ansible_host: private_ipv4_addresses[0] | default(public_ipv4_addresses[0] | default(''))
  ansible_user: "'azureadmin'"
