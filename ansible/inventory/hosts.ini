# ============================================================
# Static Ansible Inventory - SC MEDIA SRL Infrastructure
# Use this for manual testing or when Azure dynamic inventory is unavailable
# ============================================================

# ----- Windows Servers (via Jumphost) -----

[windows]
vm-jmp-01 ansible_host=JUMPHOST_PUBLIC_IP_HERE
vm-db-01 ansible_host=10.10.10.5

[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5986
ansible_user=azureadmin
# ansible_password should be stored in Ansible Vault or Azure Key Vault

# ----- Linux Servers (Rocky Linux 9) -----

[linux]
vm-web-01 ansible_host=10.10.10.10
vm-app-01 ansible_host=10.10.10.15
vm-cms-01 ansible_host=10.10.10.20

[linux:vars]
ansible_connection=ssh
ansible_user=azureadmin
ansible_ssh_private_key_file=~/.ssh/mediasrl-azure
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes
ansible_become_method=sudo

# ----- Role-based Groups -----

[jumphost]
vm-jmp-01

[database]
vm-db-01

[webserver]
vm-web-01

[appserver]
vm-app-01

[cms]
vm-cms-01

[mailserver]
vm-cms-01

# ----- Environment Groups -----

[production:children]
database
webserver
appserver
cms

[management:children]
jumphost

# ----- Subnet Groups -----

[subnet_prod]
vm-db-01
vm-web-01
vm-app-01
vm-cms-01

[subnet_mgmt]
vm-jmp-01

# ----- All Hosts -----

[all:vars]
# Azure resource group
azure_resource_group=rg-mediasrl-productie-swedencentral
# Environment
environment=productie
# Project
project=mediasrl
