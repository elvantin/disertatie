# ============================================================
# Static Ansible Inventory - SC MEDIA SRL Infrastructure
# Updated for 6 VMs: Ubuntu Jumphost + 2 Windows Servers + 3 Ubuntu Servers
# ============================================================
#
# IMPORTANT: Update IP addresses after deployment with:
# scripts/get-vm-ips.ps1 -ResourceGroup rg-mediasrl-productie-swedencentral
#
# ============================================================

# ----- Management Subnet -----

[jumphost]
# Ubuntu 22.04 LTS + XFCE + xRDP + Ansible Control Node
vm-jmp-01 ansible_host=10.10.12.4

[jumphost:vars]
ansible_connection=local
ansible_python_interpreter=/usr/bin/python3

# ----- Production Subnet - Windows Servers -----

[database]
# Windows Server 2022 - SQL Server Express
vm-db-01 ansible_host=10.10.10.5

[fileserver]
# Windows Server 2022 - SMB File Server
vm-fs-01 ansible_host=10.10.10.4

[windows:children]
database
fileserver

[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5985
ansible_user=azureadmin
ansible_password=Str0ng_P@ssw0rd_2026!

# ----- Production Subnet - Linux Servers (Ubuntu 22.04 LTS) -----

[webserver]
# Ubuntu 22.04 LTS - Nginx Web Server
vm-web-01 ansible_host=10.10.10.6

[appserver]
# Ubuntu 22.04 LTS - Application Server
vm-app-01 ansible_host=10.10.10.7

[cmsserver]
# Ubuntu 22.04 LTS - WordPress CMS + MySQL + Postfix
vm-cms-01 ansible_host=10.10.10.8

[linux:children]
webserver
appserver
cmsserver

[linux:vars]
ansible_connection=ssh
ansible_user=azureadmin
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes
ansible_ssh_common_args='-o StrictHostKeyChecking=no'

# ----- Service-Specific Groups -----

[mailserver]
# Postfix mail server (same as CMS server)
vm-cms-01

# ----- Environment Groups -----

[production:children]
database
fileserver
webserver
appserver
cmsserver

[management:children]
jumphost

# ----- Subnet Groups -----

[subnet_prod:children]
database
fileserver
webserver
appserver
cmsserver

[subnet_mgmt:children]
jumphost

[subnet_dev]
# Development subnet currently unused (10.10.11.0/24)

# ----- All Hosts Configuration -----

[all:vars]
# Azure Configuration
azure_resource_group=rg-mediasrl-productie-swedencentral
azure_location=swedencentral
azure_subscription_id=7a0255bf-d664-4920-afb0-c523b49c1908

# Environment
environment=productie
project_name=mediasrl

# Networking
vnet_address_space=10.10.0.0/20
subnet_prod=10.10.10.0/24
subnet_dev=10.10.11.0/24
subnet_mgmt=10.10.12.0/24

# Timezone
timezone=Europe/Bucharest

# NTP Servers
ntp_servers=['0.ro.pool.ntp.org', '1.ro.pool.ntp.org']

# Company Information
company_name=SC MEDIA SRL
company_domain=media-srl.ro

# ============================================================
# Security Notes:
# ============================================================
# - Windows password is stored in plaintext for initial setup
# - PRODUCTION: Move ansible_password to group_vars/all/vault.yml
# - Create vault: ansible-vault create group_vars/all/vault.yml
# - Run with vault: ansible-playbook site.yml --ask-vault-pass
# - SSH keys: Run playbooks/setup-ssh-keys.yml first for Linux VMs
# ============================================================

# ============================================================
# Testing:
# ============================================================
# Test all hosts: ansible all -m ping
# Test Linux: ansible linux -m ping
# Test Windows: ansible windows -m win_ping
# List hosts: ansible all --list-hosts
# ============================================================
