# ============================================================
# Static Ansible Inventory - SC MEDIA SRL Infrastructure
# Updated for 6 VMs: Linux Jumphost + 2 Windows Servers + 3 Linux Servers
# ============================================================

# ----- Linux Jumphost (Ansible Control Node) -----

[jumphost]
vm-jmp-01 ansible_host=JUMPHOST_PUBLIC_IP_HERE

[jumphost:vars]
ansible_connection=ssh
ansible_user=azureadmin
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes

# ----- Windows Servers -----

[windows]
vm-fs-01 ansible_host=10.10.10.5
vm-db-01 ansible_host=10.10.10.10

[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5986
ansible_user=azureadmin
# ansible_password stored in Ansible Vault

[fileserver]
vm-fs-01

[database]
vm-db-01

# ----- Linux Servers (Rocky Linux 9) -----

[linux]
vm-web-01 ansible_host=10.10.10.15
vm-app-01 ansible_host=10.10.10.20
vm-cms-01 ansible_host=10.10.10.25

[linux:vars]
ansible_connection=ssh
ansible_user=azureadmin
ansible_ssh_private_key_file=~/.ssh/id_rsa
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes

# ----- Role-based Groups -----

[webserver]
vm-web-01

[appserver]
vm-app-01

[cms]
vm-cms-01

[mailserver]
vm-cms-01

# ----- Environment Groups -----

[production:children]
fileserver
database
webserver
appserver
cms

[management:children]
jumphost

# ----- Subnet Groups -----

[subnet_prod]
vm-fs-01
vm-db-01
vm-web-01
vm-app-01
vm-cms-01

[subnet_mgmt]
vm-jmp-01

# ----- All Hosts -----

[all:vars]
# Azure resource group
azure_resource_group=rg-mediasrl-productie-swedencentral
# Environment
environment=productie
# Project
project=mediasrl
