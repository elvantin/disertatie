# ============================================================
# Dynamic Azure Inventory Plugin Configuration
# Automatically discovers VMs from Azure subscription
# ============================================================

plugin: azure_rm

# Azure authentication
# Uses environment variables or ~/.azure/credentials
auth_source: auto

# Filter VMs by resource group
include_vm_resource_groups:
  - rg-mediasrl-productie-swedencentral

# VM filters
exclude_host_filters:
  - powerstate != 'running'

# Conditional groups based on Azure tags
conditional_groups:
  windows: "'Windows' in image_offer"
  linux: "'rockylinux' in image_offer"
  production: "tags.environment == 'productie'"
  development: "tags.environment == 'dezvoltare'"

# Keyed groups (group by Azure tags)
keyed_groups:
  - prefix: tag
    key: tags
  - prefix: location
    key: location
  - prefix: os
    key: os_profile.system

# Hostnames
hostnames:
  - name
  - public_ipv4_addresses
  - private_ipv4_addresses

# Compose variables from Azure properties
compose:
  ansible_host: private_ipv4_addresses[0] | default(public_ipv4_addresses[0])
  vm_id: id
  vm_size: hardware_profile.vm_size
  vm_location: location
  vm_tags: tags
  vm_resource_group: resource_group
  vm_image_publisher: image_publisher
  vm_image_offer: image_offer
  vm_image_sku: image_sku
  vm_os_type: os_profile.system

# Use cache for better performance (5 minutes)
cache: yes
cache_plugin: jsonfile
cache_timeout: 300
cache_connection: /tmp/ansible-azure-cache
cache_prefix: azure_rm
