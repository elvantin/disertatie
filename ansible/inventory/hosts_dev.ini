# ============================================================
# Static Ansible Inventory — Development Environment
# SC MEDIA SRL / rg-mediasrl-dezvoltare-swedencentral
#
# Foloseste nume VM (Azure DNS le rezolva in VNet) — nu IPs hardcodate.
# Autentificare cu parola (SSH keys configurate ulterior de Ansible).
# Nu necesita azure.azcollection sau azure-cli Python library.
# ============================================================

# ----- Management Subnet -----

[jumphost]
vm-jmp-01

[jumphost:vars]
ansible_connection=local
ansible_python_interpreter=/usr/bin/python3

# ----- Production Subnet - Windows Servers -----

[database]
vm-db-01

[fileserver]
vm-fs-01

[windows:children]
database
fileserver

[windows:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_port=5985
ansible_user=azureadmin
# ansible_password defined in group_vars/windows.yml via vault_admin_password

# ----- Production Subnet - Linux Servers -----

[webserver]
vm-web-01

[appserver]
vm-app-01

[cmsserver]
vm-cms-01

[linux:children]
webserver
appserver
cmsserver

[linux:vars]
ansible_connection=ssh
ansible_user=azureadmin
# ansible_password defined in group_vars/linux.yml via vault_admin_password
ansible_python_interpreter=/usr/bin/python3
ansible_become=yes
ansible_ssh_common_args='-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null -o PreferredAuthentications=password,keyboard-interactive'

# ----- Service Groups -----

[mailserver]
vm-cms-01

# ----- Topology Groups -----

[production:children]
database
fileserver
webserver
appserver
cmsserver

[management:children]
jumphost

[subnet_prod:children]
database
fileserver
webserver
appserver
cmsserver

[subnet_mgmt:children]
jumphost

# ----- All Hosts Configuration -----

[all:vars]
azure_resource_group=rg-mediasrl-dezvoltare-swedencentral
azure_location=swedencentral
azure_subscription_id=7a0255bf-d664-4920-afb0-c523b49c1908

environment=dezvoltare
project_name=mediasrl

vnet_address_space=10.10.0.0/20
subnet_prod=10.10.10.0/24
subnet_dev=10.10.11.0/24
subnet_mgmt=10.10.12.0/24

timezone=Europe/Bucharest
ntp_servers=['0.ro.pool.ntp.org', '1.ro.pool.ntp.org']

company_name=SC MEDIA SRL
company_domain=media-srl.ro
