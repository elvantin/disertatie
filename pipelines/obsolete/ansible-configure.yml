# ============================================================
# Pipeline: Ansible Configuration
# Copies Ansible files to jumphost and runs playbooks via SSH
# Trigger: Manual only — run after Bicep deploy when VMs are ready
# ============================================================

trigger: none  # Manual trigger only

parameters:
  - name: playbookName
    displayName: 'Playbook to run'
    type: string
    default: 'site.yml'
    values:
      - site.yml
      - deploy-services.yml
      - harden-all.yml
      - setup-ssh-keys.yml
      - bootstrap-windows-winrm.yml
  - name: ansibleTags
    displayName: 'Ansible tags (optional, comma-separated, e.g.: webserver,cms)'
    type: string
    default: ''
  - name: ansibleVerbosity
    displayName: 'Verbosity level'
    type: string
    default: ''
    values:
      - ''
      - '-v'
      - '-vv'
      - '-vvv'

variables:
  - group: mediasrl-secrets
  - name: azureSubscription
    value: 'azure-service-connection'
  - name: jumphostUser
    value: 'azureadmin'
  - name: ansibleRemotePath
    value: '/home/azureadmin/ansible'

pool:
  name: 'Default'  # Self-hosted agent (Windows)

stages:
  # ============================================================
  # STAGE 1: Prepare — Get jumphost IP and copy files
  # ============================================================
  - stage: Prepare
    displayName: 'Prepare Jumphost'
    jobs:
      - job: CopyFiles
        displayName: 'Copy Ansible files to Jumphost'
        steps:
          - checkout: self

          # Get jumphost public IP from Azure
          - task: AzureCLI@2
            displayName: 'Get Jumphost IP'
            name: getIp
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $JumphostIp = az network public-ip show -g rg-mediasrl-persistent -n pip-vm-jmp-01 --query ipAddress -o tsv
                Write-Host "Jumphost IP: $JumphostIp"
                Write-Host "##vso[task.setvariable variable=jumphostIp;isOutput=true]$JumphostIp"

          # Copy Ansible directory to jumphost via SCP
          - task: AzureCLI@2
            displayName: 'SCP: Copy Ansible files'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $JumphostIp = "$(getIp.jumphostIp)"
                $SshKeyPath = "$(Build.SourcesDirectory)\ssh-keypair\id_rsa_mediasrl"
                $AnsibleSrc = "$(Build.SourcesDirectory)\ansible"

                Write-Host "=== Copying Ansible files to jumphost ($JumphostIp) ==="

                # Use scp to copy ansible directory to jumphost
                scp -o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -i "$SshKeyPath" -r "$AnsibleSrc\*" "$(jumphostUser)@${JumphostIp}:$(ansibleRemotePath)/"

                Write-Host "Files copied successfully."

  # ============================================================
  # STAGE 2: Configure — Run Ansible playbook on jumphost
  # ============================================================
  - stage: Configure
    displayName: 'Run Ansible Playbook'
    dependsOn: Prepare
    jobs:
      - deployment: RunPlaybook
        displayName: 'Execute Ansible on Jumphost'
        environment: 'production'
        variables:
          jumphostIp: $[ stageDependencies.Prepare.CopyFiles.outputs['getIp.jumphostIp'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none  # Files already on jumphost

                # Build and run ansible-playbook command
                - task: AzureCLI@2
                  displayName: 'Run Ansible Playbook via SSH'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: 'ps'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      $SshKeyPath = "$(Build.SourcesDirectory)\ssh-keypair\id_rsa_mediasrl"

                      # Build the ansible-playbook command
                      $PlaybookCmd = "cd $(ansibleRemotePath) && ansible-playbook playbooks/${{ parameters.playbookName }}"

                      # Add tags if specified
                      $Tags = "${{ parameters.ansibleTags }}"
                      if ($Tags -ne "") {
                        $PlaybookCmd = "$PlaybookCmd --tags $Tags"
                      }

                      # Add verbosity if specified
                      $Verbosity = "${{ parameters.ansibleVerbosity }}"
                      if ($Verbosity -ne "") {
                        $PlaybookCmd = "$PlaybookCmd $Verbosity"
                      }

                      Write-Host "=== Running Ansible on Jumphost ($(jumphostIp)) ==="
                      Write-Host "Command: $PlaybookCmd"
                      Write-Host ""

                      # Execute playbook on jumphost via SSH
                      ssh -o StrictHostKeyChecking=no -o UserKnownHostsFile=NUL -i "$SshKeyPath" "$(jumphostUser)@$(jumphostIp)" "$PlaybookCmd"

                      Write-Host ""
                      Write-Host "=== Ansible playbook completed! ==="
