# ============================================================
# Pipeline: Ansible Configuration
# Copies Ansible files to jumphost and runs playbooks via SSH
# Trigger: Manual only — run after Bicep deploy when VMs are ready
# ============================================================

trigger: none  # Manual trigger only

parameters:
  - name: playbookName
    displayName: 'Playbook to run'
    type: string
    default: 'site.yml'
    values:
      - site.yml
      - deploy-services.yml
      - harden-all.yml
      - setup-ssh-keys.yml
      - bootstrap-windows-winrm.yml
  - name: ansibleTags
    displayName: 'Ansible tags (optional, comma-separated, e.g.: webserver,cms)'
    type: string
    default: ''
  - name: ansibleVerbosity
    displayName: 'Verbosity level'
    type: string
    default: ''
    values:
      - ''
      - '-v'
      - '-vv'
      - '-vvv'

variables:
  - group: mediasrl-secrets
  - name: azureSubscription
    value: 'azure-service-connection'
  - name: jumphostUser
    value: 'azureadmin'
  - name: ansibleRemotePath
    value: '/home/azureadmin/ansible'

pool:
  vmImage: 'ubuntu-latest'

stages:
  # ============================================================
  # STAGE 1: Prepare — Get jumphost IP and copy files
  # ============================================================
  - stage: Prepare
    displayName: 'Prepare Jumphost'
    jobs:
      - job: CopyFiles
        displayName: 'Copy Ansible files to Jumphost'
        steps:
          - checkout: self

          # Get jumphost public IP from Azure
          - task: AzureCLI@2
            displayName: 'Get Jumphost IP'
            name: getIp
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                JUMPHOST_IP=$(az network public-ip show \
                  -g rg-mediasrl-persistent \
                  -n pip-vm-jmp-01 \
                  --query ipAddress -o tsv)
                echo "Jumphost IP: $JUMPHOST_IP"
                echo "##vso[task.setvariable variable=jumphostIp;isOutput=true]$JUMPHOST_IP"

          # Install SSH key for jumphost access
          - task: InstallSSHKey@0
            displayName: 'Install SSH Key'
            inputs:
              knownHostsEntry: 'placeholder'  # Will be replaced at runtime
              sshPublicKey: '$(sshPublicKey)'
              sshKeySecureFile: 'jumphost-ssh-key'  # Uploaded to Secure Files in Azure DevOps

          # Copy Ansible directory to jumphost via SCP
          - task: AzureCLI@2
            displayName: 'SCP: Copy Ansible files'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                JUMPHOST_IP=$(getIp.jumphostIp)
                SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                echo "=== Copying Ansible files to jumphost ($JUMPHOST_IP) ==="

                # Sync ansible directory to jumphost
                rsync -avz --delete \
                  -e "ssh $SSH_OPTS" \
                  $(Build.SourcesDirectory)/ansible/ \
                  $(jumphostUser)@$JUMPHOST_IP:$(ansibleRemotePath)/

                echo "Files copied successfully."

  # ============================================================
  # STAGE 2: Configure — Run Ansible playbook on jumphost
  # ============================================================
  - stage: Configure
    displayName: 'Run Ansible Playbook'
    dependsOn: Prepare
    jobs:
      - deployment: RunPlaybook
        displayName: 'Execute Ansible on Jumphost'
        environment: 'production'
        variables:
          jumphostIp: $[ stageDependencies.Prepare.CopyFiles.outputs['getIp.jumphostIp'] ]
        strategy:
          runOnce:
            deploy:
              steps:
                - checkout: none  # Files already on jumphost

                # Build ansible-playbook command
                - task: AzureCLI@2
                  displayName: 'Run Ansible Playbook via SSH'
                  inputs:
                    azureSubscription: $(azureSubscription)
                    scriptType: 'bash'
                    scriptLocation: 'inlineScript'
                    inlineScript: |
                      SSH_OPTS="-o StrictHostKeyChecking=no -o UserKnownHostsFile=/dev/null"

                      # Build the ansible-playbook command
                      PLAYBOOK_CMD="cd $(ansibleRemotePath) && ansible-playbook playbooks/${{ parameters.playbookName }}"

                      # Add tags if specified
                      if [ -n "${{ parameters.ansibleTags }}" ]; then
                        PLAYBOOK_CMD="$PLAYBOOK_CMD --tags ${{ parameters.ansibleTags }}"
                      fi

                      # Add verbosity if specified
                      if [ -n "${{ parameters.ansibleVerbosity }}" ]; then
                        PLAYBOOK_CMD="$PLAYBOOK_CMD ${{ parameters.ansibleVerbosity }}"
                      fi

                      echo "=== Running Ansible on Jumphost ($(jumphostIp)) ==="
                      echo "Command: $PLAYBOOK_CMD"
                      echo ""

                      # Execute playbook on jumphost via SSH
                      ssh $SSH_OPTS $(jumphostUser)@$(jumphostIp) "$PLAYBOOK_CMD"

                      echo ""
                      echo "=== Ansible playbook completed! ==="
