# ============================================================
# Pipeline: Packer Image Build & Publish
# Builds golden images and publishes them to Azure Compute Gallery
# Trigger: automatic on push to packer/ (only the images whose files
# actually changed are built — see "Detect Changed Packer Images" step),
# plus manual runs from the Azure DevOps UI with explicit checkboxes.
# ============================================================

trigger:
  branches:
    include:
      - master
  paths:
    include:
      - packer

parameters:
  # Choose which images to build when running the pipeline
  - name: buildUbuntuBase
    displayName: 'Build Ubuntu 22.04 Base Image'
    type: boolean
    default: false
  - name: buildJumphost
    displayName: 'Build Ubuntu 22.04 Jumphost Image'
    type: boolean
    default: false
  - name: buildWindows
    displayName: 'Build Windows Server 2022 Image'
    type: boolean
    default: false

variables:
  - group: mediasrl-secrets  # Variable Group with secrets (created in Azure DevOps)
  - name: location
    value: 'swedencentral'
  - name: galleryResourceGroup
    value: 'rg-mediasrl-packer-swedencentral'
  - name: galleryName
    value: 'gal_mediasrl'
  - name: azureSubscription
    value: 'azure-service-connection'

pool:
  name: 'Default'  # Self-hosted agent (Windows)

stages:
  # ============================================================
  # STAGE 1: Setup — Ensure Gallery and Image Definitions exist
  # ============================================================
  - stage: Setup
    displayName: 'Setup Gallery & Image Definitions'
    jobs:
      - job: SetupGallery
        displayName: 'Create Gallery if needed'
        steps:
          - checkout: self
            fetchDepth: 2  # need HEAD~1 for the change-detection diff below

          - powershell: |
              $ErrorActionPreference = "Continue"
              $changedFiles = git diff --name-only HEAD~1 HEAD 2>$null

              if ($LASTEXITCODE -ne 0 -or -not $changedFiles) {
                Write-Host "Could not determine changed files (or none) - building ALL images as a safe fallback."
                $buildBase = $true
                $buildJump = $true
                $buildWin  = $true
              } else {
                Write-Host "Changed files since previous commit:"
                $changedFiles | ForEach-Object { Write-Host "  $_" }
                $buildBase = [bool]($changedFiles | Where-Object { $_ -like 'packer/ubuntu-base/*' })
                $buildJump = [bool]($changedFiles | Where-Object { $_ -like 'packer/ubuntu-jumphost/*' })
                $buildWin  = [bool]($changedFiles | Where-Object { $_ -like 'packer/windows-server/*' })
              }

              Write-Host "Detected -> buildUbuntuBase=$buildBase  buildJumphost=$buildJump  buildWindows=$buildWin"
              Write-Host "##vso[task.setvariable variable=buildUbuntuBase;isOutput=true]$buildBase"
              Write-Host "##vso[task.setvariable variable=buildJumphost;isOutput=true]$buildJump"
              Write-Host "##vso[task.setvariable variable=buildWindows;isOutput=true]$buildWin"
            name: DetectChanges
            displayName: 'Detect Changed Packer Images'

          - task: AzureCLI@2
            displayName: 'Ensure Resource Group exists'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $rgExists = az group exists --name "$(galleryResourceGroup)"
                if ($rgExists -eq "false") {
                  Write-Host "Creating Resource Group $(galleryResourceGroup)..."
                  az group create --name "$(galleryResourceGroup)" --location "$(location)" --tags environment=productie project=mediasrl managed-by=packer
                } else {
                  Write-Host "Resource Group $(galleryResourceGroup) already exists."
                }

          - task: AzureCLI@2
            displayName: 'Ensure Compute Gallery exists'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az sig show --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" 2>$null
                if ($LASTEXITCODE -ne 0) {
                  Write-Host "Creating Gallery $(galleryName)..."
                  az sig create --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --location "$(location)" --tags environment=productie project=mediasrl managed-by=packer
                } else {
                  Write-Host "Gallery $(galleryName) already exists."
                }

          - task: AzureCLI@2
            displayName: 'Ensure Image Definitions exist'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                function New-ImgDef($DefName, $Publisher, $Offer, $Sku, $OsType) {
                  az sig image-definition show --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $DefName 2>$null
                  if ($LASTEXITCODE -ne 0) {
                    Write-Host "Creating Image Definition: $DefName"
                    az sig image-definition create --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $DefName --publisher $Publisher --offer $Offer --sku $Sku --os-type $OsType --os-state Generalized --hyper-v-generation V2 --location "$(location)" --tags environment=productie project=mediasrl managed-by=packer
                  } else {
                    Write-Host "Image Definition $DefName already exists."
                  }
                }
                New-ImgDef "imgdef-ubuntu2204" "SCMediaSRL" "Ubuntu" "22.04-LTS-Base" "Linux"
                New-ImgDef "imgdef-ubuntu2204-jumphost" "SCMediaSRL" "Ubuntu" "22.04-LTS-Jumphost" "Linux"
                New-ImgDef "imgdef-winserver2022" "SCMediaSRL" "WindowsServer" "2022-Datacenter" "Windows"

  # ============================================================
  # STAGE 2: Build Ubuntu Base Image
  # ============================================================
  - stage: BuildUbuntuBase
    displayName: 'Build Ubuntu 22.04 Base'
    dependsOn: Setup
    condition: |
      or(
        eq('${{ parameters.buildUbuntuBase }}', true),
        eq(dependencies.Setup.outputs['SetupGallery.DetectChanges.buildUbuntuBase'], 'True')
      )
    jobs:
      - job: BuildUbuntuBaseJob
        displayName: 'Packer Build: Ubuntu Base'
        timeoutInMinutes: 60
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Detect next version & Build'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = "Continue"
                $ImgDef = "imgdef-ubuntu2204"
                $PackerDir = "$(Build.SourcesDirectory)\packer\ubuntu-base"

                # Auto-detect next version
                $versions = az sig image-version list --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $ImgDef --query "[].name" -o tsv 2>$null
                if (-not $versions) {
                  $NextVersion = "1.0.0"
                } else {
                  $latest = $versions -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -match '^\d+\.\d+\.\d+$' } | Sort-Object { [version]$_ } | Select-Object -Last 1
                  $parts = $latest -split '\.'
                  $NextVersion = "$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
                }
                Write-Host "Next version: $NextVersion"

                $SubId = az account show --query id -o tsv
                Push-Location $PackerDir
                packer init .
                packer validate -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" .
                if ($LASTEXITCODE -ne 0) { throw "Packer validate failed" }
                packer build -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" -color=false .
                if ($LASTEXITCODE -ne 0) { throw "Packer build failed" }
                Pop-Location
                Write-Host "Ubuntu Base image $NextVersion published successfully!"

  # ============================================================
  # STAGE 3: Build Jumphost Image
  # ============================================================
  - stage: BuildJumphost
    displayName: 'Build Ubuntu 22.04 Jumphost'
    dependsOn: Setup
    condition: |
      or(
        eq('${{ parameters.buildJumphost }}', true),
        eq(dependencies.Setup.outputs['SetupGallery.DetectChanges.buildJumphost'], 'True')
      )
    jobs:
      - job: BuildJumphostJob
        displayName: 'Packer Build: Jumphost'
        timeoutInMinutes: 60
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Detect next version & Build'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = "Continue"
                $ImgDef = "imgdef-ubuntu2204-jumphost"
                $PackerDir = "$(Build.SourcesDirectory)\packer\ubuntu-jumphost"

                $versions = az sig image-version list --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $ImgDef --query "[].name" -o tsv 2>$null
                if (-not $versions) {
                  $NextVersion = "1.0.0"
                } else {
                  $latest = $versions -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -match '^\d+\.\d+\.\d+$' } | Sort-Object { [version]$_ } | Select-Object -Last 1
                  $parts = $latest -split '\.'
                  $NextVersion = "$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
                }
                Write-Host "Next version: $NextVersion"

                $SubId = az account show --query id -o tsv
                Push-Location $PackerDir
                packer init .
                packer validate -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" .
                if ($LASTEXITCODE -ne 0) { throw "Packer validate failed" }
                packer build -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" -color=false .
                if ($LASTEXITCODE -ne 0) { throw "Packer build failed" }
                Pop-Location
                Write-Host "Jumphost image $NextVersion published successfully!"

  # ============================================================
  # STAGE 4: Build Windows Server Image
  # ============================================================
  - stage: BuildWindows
    displayName: 'Build Windows Server 2022'
    dependsOn: Setup
    condition: |
      or(
        eq('${{ parameters.buildWindows }}', true),
        eq(dependencies.Setup.outputs['SetupGallery.DetectChanges.buildWindows'], 'True')
      )
    jobs:
      - job: BuildWindowsJob
        displayName: 'Packer Build: Windows Server'
        timeoutInMinutes: 60
        steps:
          - checkout: self

          - task: AzureCLI@2
            displayName: 'Detect next version & Build'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                $ErrorActionPreference = "Continue"
                $ImgDef = "imgdef-winserver2022"
                $PackerDir = "$(Build.SourcesDirectory)\packer\windows-server"

                $versions = az sig image-version list --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $ImgDef --query "[].name" -o tsv 2>$null
                if (-not $versions) {
                  $NextVersion = "1.0.0"
                } else {
                  $latest = $versions -split "`n" | ForEach-Object { $_.Trim() } | Where-Object { $_ -match '^\d+\.\d+\.\d+$' } | Sort-Object { [version]$_ } | Select-Object -Last 1
                  $parts = $latest -split '\.'
                  $NextVersion = "$($parts[0]).$($parts[1]).$([int]$parts[2] + 1)"
                }
                Write-Host "Next version: $NextVersion"

                $SubId = az account show --query id -o tsv
                Push-Location $PackerDir
                packer init .
                packer validate -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" .
                if ($LASTEXITCODE -ne 0) { throw "Packer validate failed" }
                packer build -var "subscription_id=$SubId" -var "gallery_resource_group=$(galleryResourceGroup)" -var "image_version=$NextVersion" -color=false .
                if ($LASTEXITCODE -ne 0) { throw "Packer build failed" }
                Pop-Location
                Write-Host "Windows Server image $NextVersion published successfully!"

  # ============================================================
  # STAGE 5: Verify — List all published image versions
  # ============================================================
  - stage: Verify
    displayName: 'Verify Published Images'
    dependsOn:
      - BuildUbuntuBase
      - BuildJumphost
      - BuildWindows
    condition: succeededOrFailed()
    jobs:
      - job: VerifyImages
        displayName: 'List Gallery Image Versions'
        steps:
          - task: AzureCLI@2
            displayName: 'Show all image versions'
            inputs:
              azureSubscription: $(azureSubscription)
              scriptType: 'ps'
              scriptLocation: 'inlineScript'
              inlineScript: |
                Write-Host "=== Azure Compute Gallery: $(galleryName) ==="
                Write-Host ""
                foreach ($def in @("imgdef-ubuntu2204", "imgdef-ubuntu2204-jumphost", "imgdef-winserver2022")) {
                  Write-Host "--- $def ---"
                  az sig image-version list --resource-group "$(galleryResourceGroup)" --gallery-name "$(galleryName)" --gallery-image-definition $def --query "[].{Version:name, State:provisioningState}" -o table 2>$null
                  if ($LASTEXITCODE -ne 0) { Write-Host "  (no versions)" }
                  Write-Host ""
                }
